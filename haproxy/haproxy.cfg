global
    log stdout format raw local0 info
    maxconn 50000
    nbthread 4

defaults
    log     global
    option  tcplog
    option  dontlognull
    timeout connect  5s
    timeout client   10m
    timeout server   10m

# ── gRPC (WatchNode → WatchTower) ────────────────────────────────────────────
# TCP mode preserves mTLS — HAProxy does not terminate TLS.
# balance source: same agent IP always hits the same WatchTower instance,
# keeping the in-memory command channel reachable.
frontend grpc_frontend
    bind *:50051
    mode tcp
    default_backend grpc_backend

backend grpc_backend
    mode tcp
    balance source
    server watchtower-1 watchtower:50051   check inter 5s fall 2 rise 2
    server watchtower-2 watchtower-2:50051 check inter 5s fall 2 rise 2

# ── REST API (Dashboard / external clients → WatchTower) ─────────────────────
# Round-robin: API is stateless — any instance answers correctly from PostgreSQL.
frontend api_frontend
    bind *:9400
    mode tcp
    default_backend api_backend

backend api_backend
    mode tcp
    balance roundrobin
    server watchtower-1 watchtower:9400   check inter 5s fall 2 rise 2
    server watchtower-2 watchtower-2:9400 check inter 5s fall 2 rise 2

# ── Stats (internal monitoring) ───────────────────────────────────────────────
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node

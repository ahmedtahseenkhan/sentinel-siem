syntax = "proto3";
package agent;
option go_package = "github.com/watchtower/watchtower/pkg/proto";

service AgentService {
    rpc StreamData(stream DataBatch) returns (stream ManagerCommand);
    rpc Register(RegistrationRequest) returns (RegistrationResponse);
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message DataBatch {
    string agent_id = 1;
    repeated DataPoint points = 2;
    int64 timestamp = 3;
}

message DataPoint {
    string type = 1;
    int64 timestamp = 2;
    map<string, Value> fields = 3;
    map<string, string> tags = 4;
}

message Value {
    oneof value {
        string string_value = 1;
        int64 int_value = 2;
        double double_value = 3;
        bool bool_value = 4;
        bytes bytes_value = 5;
    }
}

message ManagerCommand {
    string command_id = 1;
    string command_type = 2;
    bytes payload = 3;
}

message RegistrationRequest {
    string agent_id = 1;
    string hostname = 2;
    string os = 3;
    string platform = 4;
    string version = 5;
    map<string, string> labels = 6;
}

message RegistrationResponse {
    bool accepted = 1;
    string message = 2;
    string agent_id = 3;
}

message HeartbeatRequest {
    string agent_id = 1;
    int64 timestamp = 2;
    string status = 3;
}

message HeartbeatResponse {
    bool acknowledged = 1;
    int64 server_time = 2;
}

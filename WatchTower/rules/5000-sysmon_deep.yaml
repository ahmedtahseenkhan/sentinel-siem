  - id: 17088
    level: 13
    description: "Sysmon — copy of ntdll.dll / kernel32.dll into user temp (unhook prep)"
    groups: [sysmon, file_create, unhooking]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 11}
        TargetFilename: {regex: "(?i)\\\\(Temp|AppData)\\\\.*(ntdll|kernel32|kernelbase|ntoskrnl)\\.dll$"}
    mitre:
      - {tactic_id: "TA0005", technique_id: "T1562.001"}
    alert: {title: "Sysmon: System DLL copied to user temp (unhook?)"}
    enabled: true

  - id: 17089
    level: 13
    description: "Sysmon — process opening file handle to multiple .docx/.pdf in quick succession (ransomware scan)"
    groups: [sysmon, ransomware, scan_pattern]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
    correlation:
      window: "1m"
      threshold: 50
      group_by: ["ProcessGuid"]
    mitre: [{tactic_id: "TA0040", technique_id: "T1486"}]
    alert: {title: "Sysmon: Heavy file enumeration by single process"}
    enabled: true

  - id: 17090
    level: 13
    description: "Sysmon — DLL loaded with no original-file-name (likely packed/repacked)"
    groups: [sysmon, dll_load, packed]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 7}
        OriginalFileName: {equals: "-"}
        Signed: {equals: "false"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1027.002"}]
    alert: {title: "Sysmon: Unsigned DLL with no OriginalFileName"}
    enabled: true

  - id: 17091
    level: 13
    description: "Sysmon — process executed via WMIC.exe XSL stylesheet (T1220)"
    groups: [sysmon, wmic, xsl, defense_evasion]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\wmic\\.exe$"}
        CommandLine: {regex: "(?i)/format:.*\\.xsl"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1220"}]
    alert: {title: "Sysmon: wmic /format XSL proxy execution"}
    enabled: true

  - id: 17092
    level: 13
    description: "Sysmon — Microsoft.Workflow.Compiler.exe used for code execution"
    groups: [sysmon, defense_evasion, lolbas]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\Microsoft\\.Workflow\\.Compiler\\.exe$"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1127"}]
    alert: {title: "Sysmon: Workflow.Compiler.exe executed"}
    enabled: true

  - id: 17093
    level: 14
    description: "Sysmon — ngrok / chisel / frp tunneling tool executed"
    groups: [sysmon, tunneling, c2, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\(ngrok|chisel|frpc|frps|gost|httptunnel|nps)\\.exe$"}
    mitre:
      - {tactic_id: "TA0011", technique_id: "T1572"}
    alert: {title: "Sysmon: Tunneling tool executed (ngrok/chisel/frp)"}
    enabled: true

  - id: 17094
    level: 13
    description: "Sysmon — common RAT/admin tool executed (anydesk/teamviewer/screenconnect)"
    groups: [sysmon, rat, remote_access]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\(anydesk|teamviewer|connectwise|screenconnect|remotepc|splashtop|atera|gotoassist)\\.exe$"}
    mitre: [{tactic_id: "TA0011", technique_id: "T1219"}]
    alert: {title: "Sysmon: RMM / Remote-control tool executed"}
    enabled: true

  - id: 17095
    level: 13
    description: "Sysmon — process executed from removable media (T1091 transfer-via-removable)"
    groups: [sysmon, removable_media, ingress]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)^[D-Z]:\\\\.*\\.(exe|scr|bat|ps1)$"}
    mitre: [{tactic_id: "TA0001", technique_id: "T1091"}]
    alert: {title: "Sysmon: Process executed from removable drive"}
    enabled: true

  - id: 17096
    level: 13
    description: "Sysmon — runas /netonly (impersonation for SMB/share)"
    groups: [sysmon, runas, credential_use, impersonation]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\runas\\.exe$"}
        CommandLine: {regex: "(?i)/netonly"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1134"}]
    alert: {title: "Sysmon: runas /netonly"}
    enabled: true

  - id: 17097
    level: 13
    description: "Sysmon — wmic.exe spawning powershell (LOLBin chain)"
    groups: [sysmon, wmic, powershell, defense_evasion]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        ParentImage: {regex: "(?i)\\\\wmic\\.exe$"}
        Image: {regex: "(?i)\\\\powershell\\.exe$"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1218"}]
    alert: {title: "Sysmon: wmic spawning powershell"}
    enabled: true

  - id: 17098
    level: 13
    description: "Sysmon — process executed with environment-variable obfuscation (% in CommandLine)"
    groups: [sysmon, obfuscation, defense_evasion]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        CommandLine: {regex: "%[^%]+:~[\\-\\d]+,[\\-\\d]+%"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1027"}]
    alert: {title: "Sysmon: Environment-variable substring obfuscation"}
    enabled: true

  - id: 17099
    level: 13
    description: "Sysmon — DLL search-order hijack candidate (DLL written near exe outside System32)"
    groups: [sysmon, dll_hijack, persistence]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 11}
        TargetFilename: {regex: "(?i)\\\\Program Files( \\(x86\\))?\\\\.*\\\\(wininet|version|crypt32|shell32|kernel32|advapi32|user32|cryptui)\\.dll$"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1574.001"}]
    alert: {title: "Sysmon: System DLL written next to app binary (hijack)"}
    enabled: true

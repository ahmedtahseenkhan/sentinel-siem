# WatchTower — Sysmon Deep Coverage
# Rule IDs: 17000-17099
#
# Comprehensive Sysmon event detection across every event ID (1-29).
# Source: log.eventlog channel "Microsoft-Windows-Sysmon/Operational"
# Field names normalised by WatchNode (see eventlog_windows.go).

rules:
  # ── Event 1: ProcessCreate ────────────────────────────────────────────
  - id: 17000
    level: 14
    description: "Sysmon — LSASS access by non-system process (credential dumping)"
    groups: [sysmon, credential_dumping, lsass, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 10}
        TargetImage: {regex: "(?i)\\\\lsass\\.exe$"}
        GrantedAccess: {regex: "(?i)0x(1010|143A|1438|1FFFFF)"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1003.001"}
    alert: {title: "Sysmon: LSASS process access (credential dump)"}
    enabled: true

  - id: 17001
    level: 14
    description: "Sysmon — process created with rundll32 + comsvcs.dll (LSASS dump method)"
    groups: [sysmon, credential_dumping, comsvcs, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\rundll32\\.exe$"}
        CommandLine: {regex: "(?i)comsvcs\\.dll.*MiniDump"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1003.001"}]
    alert: {title: "Sysmon: rundll32 comsvcs.dll MiniDump"}
    enabled: true

  - id: 17002
    level: 13
    description: "Sysmon — process tree: Office app spawning shell"
    groups: [sysmon, macro_execution, defense_evasion, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        ParentImage: {regex: "(?i)\\\\(winword|excel|powerpnt|outlook|msaccess|mspub|onenote|visio)\\.exe$"}
        Image: {regex: "(?i)\\\\(cmd|powershell|wscript|cscript|mshta|rundll32|regsvr32|certutil|bitsadmin|wmic)\\.exe$"}
    mitre:
      - {tactic_id: "TA0001", technique_id: "T1566.001"}
    alert: {title: "Sysmon: Office app spawned shell/script"}
    enabled: true

  - id: 17003
    level: 14
    description: "Sysmon — process injection: explorer.exe writing to remote process"
    groups: [sysmon, process_injection, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 8}
        SourceImage: {regex: "(?i)\\\\(explorer|svchost|lsass)\\.exe$"}
    mitre:
      - {tactic_id: "TA0005", technique_id: "T1055"}
    alert: {title: "Sysmon: CreateRemoteThread from system process"}
    enabled: true

  - id: 17004
    level: 13
    description: "Sysmon — execution from suspicious path (Users\\Public, Temp, AppData\\Roaming)"
    groups: [sysmon, suspicious_path, execution]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\(Users\\\\Public|Temp|AppData\\\\Roaming|Downloads|ProgramData)\\\\.*\\.(exe|scr|bat|com|ps1|vbs|js|hta)$"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1059"}]
    alert: {title: "Sysmon: execution from suspicious path"}
    enabled: true

  - id: 17005
    level: 13
    description: "Sysmon — process with double extension (file.pdf.exe)"
    groups: [sysmon, evasion, masquerading]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\[^\\\\]+\\.(pdf|doc|docx|xls|xlsx|ppt|pptx|jpg|png|txt|zip|rar)\\.(exe|scr|com|bat|cmd|ps1|vbs|js)$"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1036.007"}]
    alert: {title: "Sysmon: Double extension executable"}
    enabled: true

  - id: 17006
    level: 12
    description: "Sysmon — process with UNICODE right-to-left override in name (masquerade)"
    groups: [sysmon, evasion, masquerading]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "\\u202E"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1036.002"}]
    alert: {title: "Sysmon: RTLO unicode in process name"}
    enabled: true

  - id: 17007
    level: 13
    description: "Sysmon — known LOLBin executed (certutil/bitsadmin/regsvr32/mshta/msbuild)"
    groups: [sysmon, lolbin, defense_evasion]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\(certutil|bitsadmin|regsvr32|mshta|msbuild|installutil|cmstp|odbcconf|presentationhost|xwizard)\\.exe$"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1218"}]
    alert: {title: "Sysmon: LOLBin executed"}
    enabled: true

  - id: 17008
    level: 14
    description: "Sysmon — certutil downloading file from URL"
    groups: [sysmon, certutil, download, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\certutil\\.exe$"}
        CommandLine: {regex: "(?i)(-urlcache|-split|-f).*https?://"}
    mitre:
      - {tactic_id: "TA0011", technique_id: "T1105"}
    alert: {title: "Sysmon: certutil download pattern"}
    enabled: true

  - id: 17009
    level: 14
    description: "Sysmon — bitsadmin transfer of suspicious file"
    groups: [sysmon, bitsadmin, download, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\bitsadmin\\.exe$"}
        CommandLine: {regex: "(?i)/transfer.*https?://"}
    mitre: [{tactic_id: "TA0011", technique_id: "T1197"}]
    alert: {title: "Sysmon: bitsadmin /transfer"}
    enabled: true

  - id: 17010
    level: 14
    description: "Sysmon — regsvr32 with /i:http (Squiblydoo bypass)"
    groups: [sysmon, regsvr32, squiblydoo, defense_evasion, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\regsvr32\\.exe$"}
        CommandLine: {regex: "(?i)/i:https?://"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1218.010"}]
    alert: {title: "Sysmon: regsvr32 Squiblydoo (/i:http)"}
    enabled: true

  - id: 17011
    level: 14
    description: "Sysmon — mshta executing HTA from URL"
    groups: [sysmon, mshta, defense_evasion, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\mshta\\.exe$"}
        CommandLine: {regex: "(?i)https?://|vbscript:|javascript:"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1218.005"}]
    alert: {title: "Sysmon: mshta executing remote HTA"}
    enabled: true

  - id: 17012
    level: 14
    description: "Sysmon — msbuild executing inline task (build-bypass execution)"
    groups: [sysmon, msbuild, defense_evasion, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\msbuild\\.exe$"}
        CommandLine: {regex: "(?i)\\.(xml|csproj|sln|vbproj)\\s|inline"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1127.001"}]
    alert: {title: "Sysmon: msbuild execution of project file"}
    enabled: true

  - id: 17013
    level: 13
    description: "Sysmon — InstallUtil.exe used for proxy execution"
    groups: [sysmon, installutil, defense_evasion]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\installutil\\.exe$"}
        CommandLine: {regex: "(?i)/logfile=|/u\\s|/logToConsole=false"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1218.004"}]
    alert: {title: "Sysmon: InstallUtil proxy execution"}
    enabled: true

  - id: 17014
    level: 14
    description: "Sysmon — wmic process call create (lateral movement / execution)"
    groups: [sysmon, wmic, lateral_movement, execution]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\wmic\\.exe$"}
        CommandLine: {regex: "(?i)process\\s+call\\s+create"}
    mitre:
      - {tactic_id: "TA0008", technique_id: "T1047"}
    alert: {title: "Sysmon: wmic process call create"}
    enabled: true

  - id: 17015
    level: 14
    description: "Sysmon — PsExec / paexec / smbexec lateral execution"
    groups: [sysmon, psexec, lateral_movement, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\(psexec|paexec|psexesvc|smbexec)\\.exe$"}
    mitre:
      - {tactic_id: "TA0008", technique_id: "T1021.002"}
    alert: {title: "Sysmon: PsExec-family executed"}
    enabled: true

  - id: 17016
    level: 14
    description: "Sysmon — Cobalt Strike named pipe pattern (\\\\.\\pipe\\msagent_*)"
    groups: [sysmon, cobalt_strike, c2, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 17}
        PipeName: {regex: "(?i)\\\\msagent_[0-9a-f]{2}|\\\\status_[0-9a-f]{2}|\\\\postex_[0-9a-f]{4}"}
    mitre:
      - {tactic_id: "TA0011", technique_id: "T1071"}
    alert: {title: "Sysmon: Cobalt Strike named pipe"}
    enabled: true

  - id: 17017
    level: 13
    description: "Sysmon — process with renamed system binary (e.g. svchost.exe in non-System32)"
    groups: [sysmon, masquerading, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        OriginalFileName: {regex: "(?i)^(svchost|csrss|lsass|explorer|winlogon|services|wininit)\\.exe$"}
        Image: {regex: "(?i)^(?!c:\\\\windows\\\\(system32|syswow64))"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1036.005"}]
    alert: {title: "Sysmon: System binary in non-System32 path"}
    enabled: true

  - id: 17018
    level: 12
    description: "Sysmon — high-entropy random-looking process name"
    groups: [sysmon, malware, randomized_name]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\[a-z0-9]{10,16}\\.exe$"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1036"}]
    alert: {title: "Sysmon: Random-named binary executed"}
    enabled: true

  - id: 17019
    level: 13
    description: "Sysmon — service binary executed by SYSTEM from temp / non-standard location"
    groups: [sysmon, service_abuse, persistence]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        ParentImage: {regex: "(?i)\\\\services\\.exe$"}
        Image: {regex: "(?i)\\\\(Temp|AppData|Users\\\\Public|ProgramData)\\\\"}
    mitre: [{tactic_id: "TA0003", technique_id: "T1543.003"}]
    alert: {title: "Sysmon: services.exe launched binary from suspicious path"}
    enabled: true

  - id: 17020
    level: 13
    description: "Sysmon — child of svchost.exe is not on whitelist"
    groups: [sysmon, svchost_anomaly, masquerading]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        ParentImage: {regex: "(?i)\\\\svchost\\.exe$"}
        Image: {regex: "(?i)\\\\(cmd|powershell|wscript|cscript)\\.exe$"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1036.004"}]
    alert: {title: "Sysmon: Unusual child of svchost.exe"}
    enabled: true

  - id: 17021
    level: 13
    description: "Sysmon — net.exe / net1.exe domain / group enumeration"
    groups: [sysmon, net_enum, recon]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\net1?\\.exe$"}
        CommandLine: {regex: "(?i)\\b(group|user|localgroup|view|share|use|session|accounts)\\b"}
    mitre: [{tactic_id: "TA0007", technique_id: "T1087.002"}]
    alert: {title: "Sysmon: net.exe enumeration"}
    enabled: true

  - id: 17022
    level: 13
    description: "Sysmon — nltest.exe domain enumeration"
    groups: [sysmon, nltest, recon]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\nltest\\.exe$"}
        CommandLine: {regex: "(?i)/(domain_trusts|dclist|trusted_domains|all_trusts)"}
    mitre: [{tactic_id: "TA0007", technique_id: "T1482"}]
    alert: {title: "Sysmon: nltest domain enumeration"}
    enabled: true

  - id: 17023
    level: 13
    description: "Sysmon — whoami /priv or /groups (privilege/group recon)"
    groups: [sysmon, whoami, recon]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\whoami\\.exe$"}
        CommandLine: {regex: "(?i)/(priv|groups|all)"}
    mitre: [{tactic_id: "TA0007", technique_id: "T1033"}]
    alert: {title: "Sysmon: whoami privilege recon"}
    enabled: true

  - id: 17024
    level: 12
    description: "Sysmon — quser / qwinsta (session enumeration)"
    groups: [sysmon, session_enum, recon]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\(quser|qwinsta|query)\\.exe$"}
    mitre: [{tactic_id: "TA0007", technique_id: "T1033"}]
    alert: {title: "Sysmon: session enumeration tool"}
    enabled: true

  - id: 17025
    level: 13
    description: "Sysmon — tasklist /svc /v (process & service recon)"
    groups: [sysmon, tasklist, recon]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\tasklist\\.exe$"}
        CommandLine: {regex: "(?i)/(svc|v|m|s\\s)"}
    mitre: [{tactic_id: "TA0007", technique_id: "T1057"}]
    alert: {title: "Sysmon: tasklist verbose enumeration"}
    enabled: true

  - id: 17026
    level: 13
    description: "Sysmon — ipconfig /all + route + arp (network recon burst)"
    groups: [sysmon, network_recon]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\(ipconfig|route|arp|netstat|tracert|ping)\\.exe$"}
    correlation:
      window: "2m"
      threshold: 5
      group_by: ["agent_name"]
    mitre: [{tactic_id: "TA0007", technique_id: "T1016"}]
    alert: {title: "Sysmon: Network recon command burst"}
    enabled: true

  - id: 17027
    level: 13
    description: "Sysmon — net.exe use \\\\<host>\\ipc$ (lateral SMB)"
    groups: [sysmon, smb_share, lateral_movement]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\net1?\\.exe$"}
        CommandLine: {regex: "(?i)use\\s+\\\\\\\\\\S+\\\\(ipc\\$|admin\\$|c\\$)"}
    mitre: [{tactic_id: "TA0008", technique_id: "T1021.002"}]
    alert: {title: "Sysmon: net use to admin/c/ipc share"}
    enabled: true

  - id: 17028
    level: 14
    description: "Sysmon — Mimikatz signature in commandline (sekurlsa::logonpasswords)"
    groups: [sysmon, mimikatz, credential_dumping, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        CommandLine: {regex: "(?i)(sekurlsa::logonpasswords|sekurlsa::pth|kerberos::golden|kerberos::ptt|crypto::|misc::skeleton|lsadump::)"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1003"}
    alert: {title: "Sysmon: Mimikatz module in commandline"}
    enabled: true

  - id: 17029
    level: 13
    description: "Sysmon — vssadmin delete shadows (anti-recovery / ransomware)"
    groups: [sysmon, vssadmin, ransomware, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\vssadmin\\.exe$"}
        CommandLine: {regex: "(?i)delete\\s+shadows"}
    mitre: [{tactic_id: "TA0040", technique_id: "T1490"}]
    alert: {title: "Sysmon: vssadmin delete shadows"}
    enabled: true

  - id: 17030
    level: 13
    description: "Sysmon — wbadmin delete catalog / systemstatebackup (anti-recovery)"
    groups: [sysmon, backup_destruction, ransomware]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\wbadmin\\.exe$"}
        CommandLine: {regex: "(?i)delete\\s+(catalog|systemstatebackup|backup)"}
    mitre: [{tactic_id: "TA0040", technique_id: "T1490"}]
    alert: {title: "Sysmon: wbadmin delete backup"}
    enabled: true

  - id: 17031
    level: 13
    description: "Sysmon — bcdedit disabling recovery (boot config tampering)"
    groups: [sysmon, bcdedit, ransomware, anti_recovery]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\bcdedit\\.exe$"}
        CommandLine: {regex: "(?i)(recoveryenabled\\s+no|bootstatuspolicy\\s+ignoreallfailures)"}
    mitre: [{tactic_id: "TA0040", technique_id: "T1490"}]
    alert: {title: "Sysmon: bcdedit disabling recovery"}
    enabled: true

  - id: 17032
    level: 13
    description: "Sysmon — wevtutil cl (clear Windows Event Log)"
    groups: [sysmon, log_tampering, defense_evasion]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\wevtutil\\.exe$"}
        CommandLine: {regex: "(?i)\\bcl\\b"}
    mitre:
      - {tactic_id: "TA0005", technique_id: "T1070.001"}
    alert: {title: "Sysmon: wevtutil clear log"}
    enabled: true

  - id: 17033
    level: 13
    description: "Sysmon — fsutil usn deletejournal (anti-forensics)"
    groups: [sysmon, fsutil, anti_forensics]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\fsutil\\.exe$"}
        CommandLine: {regex: "(?i)usn\\s+deletejournal"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1070"}]
    alert: {title: "Sysmon: fsutil USN journal deleted"}
    enabled: true

  - id: 17034
    level: 13
    description: "Sysmon — reg.exe modification of Run keys (persistence)"
    groups: [sysmon, registry, persistence]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\reg\\.exe$"}
        CommandLine: {regex: "(?i)(add|set).*\\\\CurrentVersion\\\\(Run|RunOnce|RunOnceEx)\\\\?"}
    mitre:
      - {tactic_id: "TA0003", technique_id: "T1547.001"}
    alert: {title: "Sysmon: Run key registry persistence via reg.exe"}
    enabled: true

  - id: 17035
    level: 14
    description: "Sysmon — reg.exe SAM/SYSTEM/SECURITY hive export (creds offline)"
    groups: [sysmon, hive_export, credential_dumping, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\reg\\.exe$"}
        CommandLine: {regex: "(?i)\\b(save|export)\\b.*hk(lm|cu)?\\\\(sam|system|security)"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1003.002"}
    alert: {title: "Sysmon: reg save SAM/SYSTEM/SECURITY hive"}
    enabled: true

  - id: 17036
    level: 13
    description: "Sysmon — schtasks /create (scheduled task persistence)"
    groups: [sysmon, schtasks, persistence]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\schtasks\\.exe$"}
        CommandLine: {regex: "(?i)/create"}
    mitre: [{tactic_id: "TA0003", technique_id: "T1053.005"}]
    alert: {title: "Sysmon: schtasks /create"}
    enabled: true

  - id: 17037
    level: 13
    description: "Sysmon — sc.exe create / config service (persistence)"
    groups: [sysmon, sc_exe, persistence]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\sc\\.exe$"}
        CommandLine: {regex: "(?i)\\s(create|config|failure)\\s"}
    mitre: [{tactic_id: "TA0003", technique_id: "T1543.003"}]
    alert: {title: "Sysmon: sc.exe service modification"}
    enabled: true

  - id: 17038
    level: 13
    description: "Sysmon — net.exe localgroup administrators add (privilege escalation)"
    groups: [sysmon, local_group, privilege_escalation]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\net1?\\.exe$"}
        CommandLine: {regex: "(?i)localgroup.*administrators.*\\b/add\\b"}
    mitre: [{tactic_id: "TA0004", technique_id: "T1098"}]
    alert: {title: "Sysmon: User added to local Administrators"}
    enabled: true

  - id: 17039
    level: 13
    description: "Sysmon — process executing with -encodedcommand (PowerShell)"
    groups: [sysmon, powershell, encoded, defense_evasion]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\powershell(_ise)?\\.exe$"}
        CommandLine: {regex: "(?i)\\s-e(nc(odedcommand)?)?\\s+[A-Za-z0-9+/=]{30,}"}
    mitre:
      - {tactic_id: "TA0005", technique_id: "T1059.001"}
    alert: {title: "Sysmon: PowerShell -EncodedCommand"}
    enabled: true

  - id: 17040
    level: 13
    description: "Sysmon — PowerShell with -nop -w hidden -exec bypass (classic stager pattern)"
    groups: [sysmon, powershell, evasion]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\powershell(_ise)?\\.exe$"}
        CommandLine: {regex: "(?i)-n(o)?p(rofile)?\\s.*-w(in)?\\s+hidden|-exec(utionpolicy)?\\s+bypass"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1059.001"}]
    alert: {title: "Sysmon: PowerShell -nop -w hidden -exec bypass"}
    enabled: true

  - id: 17041
    level: 14
    description: "Sysmon — PowerShell IEX (DownloadString) — fileless stager"
    groups: [sysmon, powershell, downloadstring, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        CommandLine: {regex: "(?i)(iex|invoke-expression).*(downloadstring|net\\.webclient|invoke-webrequest)"}
    mitre:
      - {tactic_id: "TA0011", technique_id: "T1105"}
    alert: {title: "Sysmon: PowerShell IEX downloadstring"}
    enabled: true

  - id: 17042
    level: 13
    description: "Sysmon — odbcconf used for proxy execution"
    groups: [sysmon, odbcconf, defense_evasion]
    match:
      type: "log.eventlog"

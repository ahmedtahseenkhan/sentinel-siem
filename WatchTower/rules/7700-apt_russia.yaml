# Russian-nexus APT TTPs (APT28/Fancy Bear, APT29/Cozy Bear, Sandworm, Turla, Gamaredon)
# IDs 19390-19429 (40 rules)

- id: 19390
  level: 12
  description: "APT29: SUNBURST-style DLL sideloading via SolarWinds binary"
  groups: [apt, apt29, cozy_bear, supply_chain]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 1}
      image: {regex: "(?i)\\\\(solarwinds\\.businesslayerhost|netsetupsvc)\\.exe"}
      cmd: {regex: "(?i)(invoke|backdoor|appsync)"}
  mitre:
    - {tactic_id: "TA0001", technique_id: "T1195.002", technique_name: "Compromise Software Supply Chain"}
  alert: {title: "APT29: SUNBURST sideloading pattern"}
  enabled: true


# WatchTower — AWS CloudTrail Detection
# Rule IDs: 16500-16579
#
# Source: CloudTrail events ingested via a cloud connector. Each event is
# JSON; rules match against the raw `message` field. Common fields:
#   eventName, eventSource, userIdentity.type, userIdentity.userName,
#   userIdentity.arn, sourceIPAddress, awsRegion, errorCode, errorMessage,
#   requestParameters, responseElements, mfaAuthenticated.

rules:
  # ── Identity / Root / IAM ─────────────────────────────────────────────
  - id: 16500
    level: 14
    description: "AWS — Root account console login"
    groups: [aws, cloudtrail, root_account, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"ConsoleLogin\".*\"userIdentity\".*\"type\":\\s*\"Root\""}
    mitre:
      - {tactic_id: "TA0001", technique_id: "T1078.004"}
    alert: {title: "AWS: Root account console login"}
    enabled: true

  - id: 16501
    level: 14
    description: "AWS — Root account API activity"
    groups: [aws, cloudtrail, root_account, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"userIdentity\".*\"type\":\\s*\"Root\".*\"eventSource\":"}
    mitre: [{tactic_id: "TA0001", technique_id: "T1078.004"}]
    alert: {title: "AWS: Root API call (review immediately)"}
    enabled: true

  - id: 16502
    level: 13
    description: "AWS — Console login without MFA"
    groups: [aws, cloudtrail, mfa, weak_auth]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"ConsoleLogin\".*\"MFAUsed\":\\s*\"No\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1078.004"}]
    alert: {title: "AWS: Console login without MFA"}
    enabled: true

  - id: 16503
    level: 13
    description: "AWS — Failed console login (brute force)"
    groups: [aws, cloudtrail, brute_force, auth]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"ConsoleLogin\".*\"errorMessage\":\\s*\"Failed authentication\""}
    correlation:
      window: "10m"
      threshold: 5
      group_by: ["agent_name"]
    mitre: [{tactic_id: "TA0006", technique_id: "T1110.001"}]
    alert: {title: "AWS: Console login brute force"}
    enabled: true

  - id: 16504
    level: 13
    description: "AWS — IAM user created"
    groups: [aws, cloudtrail, iam, account_creation]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"CreateUser\""}
    mitre: [{tactic_id: "TA0003", technique_id: "T1136.003"}]
    alert: {title: "AWS: IAM CreateUser"}
    enabled: true

  - id: 16505
    level: 14
    description: "AWS — IAM access key created for existing user (persistence)"
    groups: [aws, cloudtrail, iam, persistence, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"CreateAccessKey\""}
    mitre:
      - {tactic_id: "TA0003", technique_id: "T1098.001"}
    alert: {title: "AWS: IAM CreateAccessKey (persistence)"}
    enabled: true

  - id: 16506
    level: 13
    description: "AWS — IAM login profile created/updated for user (password set / persistence)"
    groups: [aws, cloudtrail, iam, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*(\"CreateLoginProfile\"|\"UpdateLoginProfile\")"}
    mitre: [{tactic_id: "TA0003", technique_id: "T1098.001"}]
    alert: {title: "AWS: IAM login profile created/updated"}
    enabled: true

  - id: 16507
    level: 14
    description: "AWS — AdministratorAccess policy attached to user/role"
    groups: [aws, cloudtrail, iam, privilege_escalation, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"AttachUserPolicy\".*AdministratorAccess|\"eventName\":\\s*\"AttachRolePolicy\".*AdministratorAccess"}
    mitre:
      - {tactic_id: "TA0004", technique_id: "T1098"}
    alert: {title: "AWS: AdministratorAccess policy attached"}
    enabled: true

  - id: 16508
    level: 14
    description: "AWS — PutUserPolicy / PutRolePolicy with wildcard action+resource"
    groups: [aws, cloudtrail, iam, privilege_escalation, wildcard, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"PutUserPolicy|PutRolePolicy\".*\"Action\":\\s*\"\\*\".*\"Resource\":\\s*\"\\*\""}
    mitre: [{tactic_id: "TA0004", technique_id: "T1098"}]
    alert: {title: "AWS: Inline policy with *:* (full admin)"}
    enabled: true

  - id: 16509
    level: 13
    description: "AWS — IAM CreatePolicyVersion + SetDefault (policy version hijack)"
    groups: [aws, cloudtrail, iam, privilege_escalation]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*(\"CreatePolicyVersion\"|\"SetDefaultPolicyVersion\")"}
    mitre: [{tactic_id: "TA0004", technique_id: "T1098"}]
    alert: {title: "AWS: Managed policy version manipulated"}
    enabled: true

  - id: 16510
    level: 14
    description: "AWS — AssumeRole by suspicious external account / unusual principal"
    groups: [aws, cloudtrail, iam, lateral_movement]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"AssumeRole\""}
    enrich:
      baseline: "principal.arn"
    mitre:
      - {tactic_id: "TA0008", technique_id: "T1078.004"}
    alert: {title: "AWS: AssumeRole — review principal"}
    enabled: true

  - id: 16511
    level: 13
    description: "AWS — UpdateAssumeRolePolicy modifying trust relationship"
    groups: [aws, cloudtrail, iam, trust_relationship, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"UpdateAssumeRolePolicy\""}
    mitre: [{tactic_id: "TA0008", technique_id: "T1098"}]
    alert: {title: "AWS: Role trust policy updated"}
    enabled: true

  - id: 16512
    level: 13
    description: "AWS — IAM password policy weakened"
    groups: [aws, cloudtrail, iam, hardening_regression]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"UpdateAccountPasswordPolicy\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001"}]
    alert: {title: "AWS: Account password policy updated"}
    enabled: true

  - id: 16513
    level: 14
    description: "AWS — MFA device deactivated for user"
    groups: [aws, cloudtrail, mfa, defense_evasion, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"DeactivateMFADevice\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1556"}]
    alert: {title: "AWS: MFA deactivated"}
    enabled: true

  - id: 16514
    level: 13
    description: "AWS — virtual MFA device deleted"
    groups: [aws, cloudtrail, mfa, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"DeleteVirtualMFADevice\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1556"}]
    alert: {title: "AWS: Virtual MFA device deleted"}
    enabled: true

  # ── CloudTrail / Logging / Monitoring Tampering ───────────────────────
  - id: 16515
    level: 14
    description: "AWS — CloudTrail trail stopped"
    groups: [aws, cloudtrail, audit_tampering, defense_evasion, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"StopLogging\""}
    mitre:
      - {tactic_id: "TA0005", technique_id: "T1562.008"}
    alert: {title: "AWS: CloudTrail StopLogging"}
    enabled: true

  - id: 16516
    level: 14
    description: "AWS — CloudTrail trail deleted"
    groups: [aws, cloudtrail, audit_tampering, defense_evasion, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"DeleteTrail\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.008"}]
    alert: {title: "AWS: CloudTrail trail deleted"}
    enabled: true

  - id: 16517
    level: 13
    description: "AWS — CloudTrail trail updated (S3 bucket / filter change)"
    groups: [aws, cloudtrail, audit_tampering, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"UpdateTrail\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.008"}]
    alert: {title: "AWS: CloudTrail UpdateTrail"}
    enabled: true

  - id: 16518
    level: 13
    description: "AWS — CloudTrail event selector modified (log scope reduced)"
    groups: [aws, cloudtrail, audit_tampering, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"PutEventSelectors\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.008"}]
    alert: {title: "AWS: CloudTrail event selector modified"}
    enabled: true

  - id: 16519
    level: 13
    description: "AWS — S3 bucket logging disabled"
    groups: [aws, cloudtrail, s3, audit_tampering]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"PutBucketLogging\".*\"LoggingEnabled\":\\s*null"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.008"}]
    alert: {title: "AWS: S3 bucket logging disabled"}
    enabled: true

  - id: 16520
    level: 13
    description: "AWS — VPC FlowLog deleted"
    groups: [aws, vpc, audit_tampering]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"DeleteFlowLogs\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.008"}]
    alert: {title: "AWS: VPC FlowLog deleted"}
    enabled: true

  - id: 16521
    level: 13
    description: "AWS — GuardDuty detector disabled / deleted"
    groups: [aws, guardduty, defense_evasion, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*(\"DeleteDetector\"|\"UpdateDetector\".*\"Enable\":\\s*false)"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001"}]
    alert: {title: "AWS: GuardDuty detector disabled/deleted"}
    enabled: true

  - id: 16522
    level: 13
    description: "AWS — AWS Config recorder stopped / deleted"
    groups: [aws, config, audit_tampering]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*(\"StopConfigurationRecorder\"|\"DeleteConfigurationRecorder\")"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.008"}]
    alert: {title: "AWS: Config recorder stopped/deleted"}
    enabled: true

  - id: 16523
    level: 13
    description: "AWS — CloudWatch alarm deleted (alert suppression)"
    groups: [aws, cloudwatch, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"DeleteAlarms\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001"}]
    alert: {title: "AWS: CloudWatch alarm deleted"}
    enabled: true

  - id: 16524
    level: 13
    description: "AWS — CloudWatch Logs log group deleted"
    groups: [aws, cloudwatch, audit_tampering]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"DeleteLogGroup\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.008"}]
    alert: {title: "AWS: CloudWatch log group deleted"}
    enabled: true

  # ── S3 ────────────────────────────────────────────────────────────────
  - id: 16525
    level: 14
    description: "AWS — S3 bucket policy granting public access"
    groups: [aws, s3, public_exposure, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"PutBucketPolicy\".*\"Principal\":\\s*\"\\*\""}
    mitre:
      - {tactic_id: "TA0010", technique_id: "T1567.002"}
    alert: {title: "AWS: S3 bucket policy with Principal=*"}
    enabled: true

  - id: 16526
    level: 13
    description: "AWS — S3 bucket ACL set to public-read or public-read-write"
    groups: [aws, s3, public_exposure]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"PutBucketAcl\".*\"public-read(-write)?\""}
    mitre: [{tactic_id: "TA0010", technique_id: "T1567.002"}]
    alert: {title: "AWS: S3 ACL set public"}
    enabled: true

  - id: 16527
    level: 13
    description: "AWS — S3 PublicAccessBlock removed"
    groups: [aws, s3, public_exposure]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"DeletePublicAccessBlock\"|PutPublicAccessBlock.*\"BlockPublicAcls\":\\s*false"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001"}]
    alert: {title: "AWS: S3 PublicAccessBlock weakened"}
    enabled: true

  - id: 16528
    level: 13
    description: "AWS — Mass S3 ListObjects from one identity (data discovery)"
    groups: [aws, s3, recon]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"ListObjects\""}
    correlation:
      window: "10m"
      threshold: 100
      group_by: ["agent_name"]
    mitre: [{tactic_id: "TA0009", technique_id: "T1530"}]
    alert: {title: "AWS: S3 ListObjects burst"}
    enabled: true

  - id: 16529
    level: 14
    description: "AWS — Mass S3 GetObject burst (data exfiltration)"
    groups: [aws, s3, exfiltration, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"GetObject\""}
    correlation:
      window: "5m"
      threshold: 200
      group_by: ["agent_name"]
    mitre:
      - {tactic_id: "TA0010", technique_id: "T1530"}
    alert: {title: "AWS: S3 GetObject mass-read"}
    enabled: true

  - id: 16530
    level: 13
    description: "AWS — S3 DeleteObject burst (destruction / ransomware-prep)"
    groups: [aws, s3, destructive, impact]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"DeleteObject\""}
    correlation:
      window: "5m"
      threshold: 50
    mitre: [{tactic_id: "TA0040", technique_id: "T1485"}]
    alert: {title: "AWS: S3 mass DeleteObject"}
    enabled: true

  - id: 16531
    level: 13
    description: "AWS — S3 versioning suspended / disabled"
    groups: [aws, s3, defense_evasion, ransomware_prep]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"PutBucketVersioning\".*\"Status\":\\s*\"Suspended\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001"}]
    alert: {title: "AWS: S3 bucket versioning suspended"}
    enabled: true

  - id: 16532
    level: 13
    description: "AWS — S3 lifecycle rule expiring objects added"
    groups: [aws, s3, destructive, ransomware_prep]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"PutBucketLifecycle\".*\"Expiration\""}
    mitre: [{tactic_id: "TA0040", technique_id: "T1485"}]
    alert: {title: "AWS: S3 lifecycle expiration added"}
    enabled: true

  # ── EC2 / Compute ─────────────────────────────────────────────────────
  - id: 16533
    level: 13
    description: "AWS — RunInstances of GPU/large instance (cryptomining suspect)"
    groups: [aws, ec2, cryptomining, impact]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"RunInstances\".*\"instanceType\":\\s*\"(p3|p4|g4|g5|x1|x2|c5|c6).*xlarge\""}
    mitre:
      - {tactic_id: "TA0040", technique_id: "T1496"}
    alert: {title: "AWS: Large/GPU instance launched"}
    enabled: true

  - id: 16534
    level: 13
    description: "AWS — Mass RunInstances burst (resource hijack)"
    groups: [aws, ec2, cryptomining, impact]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"RunInstances\""}
    correlation:
      window: "5m"
      threshold: 10
      group_by: ["agent_name"]
    mitre: [{tactic_id: "TA0040", technique_id: "T1496"}]
    alert: {title: "AWS: RunInstances burst (mining suspect)"}
    enabled: true

  - id: 16535
    level: 13
    description: "AWS — EC2 instance launched in unusual region"
    groups: [aws, ec2, region_anomaly]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"RunInstances\""}
    enrich:
      baseline: "account.region"
    mitre: [{tactic_id: "TA0005", technique_id: "T1535"}]
    alert: {title: "AWS: Instance in new region"}
    enabled: true

  - id: 16536
    level: 14
    description: "AWS — Security group rule allowing 0.0.0.0/0 on SSH/RDP/DB ports"
    groups: [aws, ec2, security_group, exposure, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"AuthorizeSecurityGroupIngress\".*\"cidrIp\":\\s*\"0\\.0\\.0\\.0/0\".*\"(fromPort|toPort)\":\\s*(22|3389|3306|5432|1433|6379|27017|9200|9300)"}
    mitre:
      - {tactic_id: "TA0001", technique_id: "T1190"}
    alert: {title: "AWS: SG opens sensitive port to 0.0.0.0/0"}
    enabled: true

  - id: 16537
    level: 12
    description: "AWS — Security group rule with 0.0.0.0/0 (any other port)"
    groups: [aws, ec2, security_group, exposure]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"AuthorizeSecurityGroupIngress\".*\"cidrIp\":\\s*\"0\\.0\\.0\\.0/0\""}
    mitre: [{tactic_id: "TA0001", technique_id: "T1190"}]
    alert: {title: "AWS: SG opens port to 0.0.0.0/0"}
    enabled: true

  - id: 16538
    level: 13
    description: "AWS — Network ACL allowing 0.0.0.0/0"
    groups: [aws, vpc, exposure]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"CreateNetworkAclEntry\".*\"cidrBlock\":\\s*\"0\\.0\\.0\\.0/0\".*\"ruleAction\":\\s*\"allow\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.007"}]
    alert: {title: "AWS: NACL allow 0.0.0.0/0"}
    enabled: true

  - id: 16539
    level: 13
    description: "AWS — IMDSv2 disabled / metadata service made v1"
    groups: [aws, ec2, imds, downgrade]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"ModifyInstanceMetadataOptions\".*\"HttpTokens\":\\s*\"optional\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1552.005"}]
    alert: {title: "AWS: IMDSv2 made optional (v1 reintroduced)"}
    enabled: true

  - id: 16540
    level: 14
    description: "AWS — EC2 instance metadata token requested by unusual process (SSRF suspect)"
    groups: [aws, ec2, imds, ssrf, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"sourceIPAddress\":\\s*\"169\\.254\\.169\\.254\""}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1552.005"}
    alert: {title: "AWS: Metadata service accessed via SSRF (169.254.169.254)"}
    enabled: true

  # ── Lambda ────────────────────────────────────────────────────────────
  - id: 16541
    level: 13
    description: "AWS — Lambda function code updated"
    groups: [aws, lambda, supply_chain, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"UpdateFunctionCode\""}
    mitre: [{tactic_id: "TA0003", technique_id: "T1648"}]
    alert: {title: "AWS: Lambda UpdateFunctionCode"}
    enabled: true

  - id: 16542
    level: 13
    description: "AWS — Lambda function created with admin role"
    groups: [aws, lambda, privilege_escalation, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"CreateFunction\".*role.*(Admin|admin)"}
    mitre: [{tactic_id: "TA0003", technique_id: "T1648"}]
    alert: {title: "AWS: Lambda created with admin role"}
    enabled: true

  - id: 16543
    level: 14
    description: "AWS — Lambda layer added from external account (supply-chain)"
    groups: [aws, lambda, supply_chain, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"UpdateFunctionConfiguration\".*\"Layers\":.*arn:aws:lambda:[^:]+:(?!\\d+:layer:internal)"}
    mitre:
      - {tactic_id: "TA0001", technique_id: "T1195"}
    alert: {title: "AWS: Lambda layer from external account"}
    enabled: true

  - id: 16544
    level: 13
    description: "AWS — Lambda function URL created with no auth (public)"
    groups: [aws, lambda, public_exposure]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"CreateFunctionUrlConfig\".*\"AuthType\":\\s*\"NONE\""}
    mitre: [{tactic_id: "TA0001", technique_id: "T1190"}]
    alert: {title: "AWS: Lambda Function URL with no auth"}
    enabled: true

  # ── KMS / Secrets / Parameter Store ───────────────────────────────────
  - id: 16545
    level: 14
    description: "AWS — KMS key scheduled for deletion"
    groups: [aws, kms, destructive, ransomware_prep, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"ScheduleKeyDeletion\""}
    mitre:
      - {tactic_id: "TA0040", technique_id: "T1485"}
    alert: {title: "AWS: KMS ScheduleKeyDeletion"}
    enabled: true

  - id: 16546
    level: 13
    description: "AWS — KMS key disabled"
    groups: [aws, kms, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"DisableKey\""}
    mitre: [{tactic_id: "TA0040", technique_id: "T1485"}]
    alert: {title: "AWS: KMS key disabled"}
    enabled: true

  - id: 16547
    level: 13
    description: "AWS — Secrets Manager GetSecretValue burst"
    groups: [aws, secrets_manager, credential_access]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"eventName\":\\s*\"GetSecretValue\""}
    correlation:
      window: "10m"
      threshold: 50
      group_by: ["agent_name"]
    mitre: [{tactic_id: "TA0006", technique_id: "T1555.006"}]
    alert: {title: "AWS: Secrets Manager mass GetSecretValue"}
    enabled: true

  - id: 16548
    level: 13
    description: "AWS — SSM Parameter Store GetParameter burst (with decryption)"
    groups: [aws, ssm, credential_access]
    match:
      type: "log.file"
      fields:

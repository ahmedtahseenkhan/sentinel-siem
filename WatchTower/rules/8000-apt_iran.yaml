- id: 19522
  level: 12
  description: "Agrius: 'BabyWiper' MBR sector zeroing"
  groups: [apt, agrius, wiper]
  match:
    type: "log.file"
    fields:
      source: {equals: "fim"}
      path: {regex: "\\\\PhysicalDrive[0-9]+"}
      action: {equals: "write_zero"}
  alert: {title: "Agrius: MBR zeroed"}
  enabled: true

- id: 19523
  level: 11
  description: "APT35: Educational/think-tank target spearphish from gmail to corp"
  groups: [apt, apt35, phishing]
  match:
    type: "log.file"
    fields:
      sender_address: {regex: "(?i)@gmail\\.com$"}
      subject: {regex: "(?i)(interview|panel|webinar|conference).*(iran|middle east|sanctions)"}
  alert: {title: "APT35: think-tank spearphish lure"}
  enabled: true

- id: 19524
  level: 11
  description: "MuddyWater: PsExec deployed POWERSTATS to multiple hosts"
  groups: [apt, muddywater, lateral]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 1}
      image: {regex: "(?i)psexec(svc)?\\.exe"}
  correlation: {window: "30m", threshold: 5, group_by: ["src_user"]}
  alert: {title: "MuddyWater: PsExec spray"}
  enabled: true

- id: 19525
  level: 12
  description: "APT33: targeting Saudi/UAE petrochemical with Sysmon disabled"
  groups: [apt, apt33, evasion]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 4799}
      detail: {regex: "(?i)microsoft-windows-sysmon"}
      action: {equals: "uninstall"}
  alert: {title: "APT33: Sysmon uninstall"}
  enabled: true

- id: 19526
  level: 11
  description: "Pioneer Kitten: targeting Israeli targets - Hebrew filename lure"
  groups: [apt, pioneer_kitten, phishing]
  match:
    type: "log.file"

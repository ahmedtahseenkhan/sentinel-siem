- id: 19529
  level: 12
  description: "Agrius: 'DEADWOOD' deploy via Group Policy"
  groups: [apt, agrius, lateral]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 5145}
      share: {equals: "SYSVOL"}
      action: {regex: "(?i)write|create"}
      object: {regex: "(?i)scripts\\\\(startup|logon).*\\.exe"}
  alert: {title: "Agrius: GPO startup script tamper"}
  enabled: true

- id: 19521
  level: 11
  description: "APT34: DnsExfiltrator Python beacon to .pw / .top TLDs"
  groups: [apt, apt34, exfil]
  match:
    type: "log.file"
    fields:
      query: {regex: "(?i)\\.[a-z0-9]{4,}\\.(pw|top|xyz|cf)$"}
      query_type: {regex: "(AAAA|NULL|TXT)"}
  alert: {title: "APT34: suspicious TLD DNS exfil"}

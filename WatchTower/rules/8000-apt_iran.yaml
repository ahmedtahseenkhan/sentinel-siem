# Iran-nexus APT TTPs (APT33/Elfin, APT34/OilRig, APT35/Charming Kitten, MuddyWater, Pioneer Kitten, Agrius)
# IDs 19500-19529 (30 rules)

- id: 19500
  level: 12
  description: "APT33: Shamoon disk wiper deployment"
  groups: [apt, apt33, iran, wiper]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 1}
      image: {regex: "(?i)\\\\(shamoon|distrack|filerasedrv|elrawdisk)\\.(exe|sys)$"}
  mitre:
    - {tactic_id: "TA0040", technique_id: "T1561.001", technique_name: "Disk Content Wipe"}
  alert: {title: "APT33: Shamoon wiper"}
  enabled: true

- id: 19501
  level: 12
  description: "APT34: BONDUPDATER PowerShell trojan with DNS C2"
  groups: [apt, apt34, oilrig, c2]
  match:
    type: "log.file"
    fields:
      query: {regex: "(?i)^[a-z0-9]{4,8}\\.bond[a-z]{4,8}\\."}
      query_type: {equals: "TXT"}
  alert: {title: "APT34: BONDUPDATER DNS TXT C2"}
  enabled: true

- id: 19502
  level: 12
  description: "APT34: ISMDoor backdoor pipe and DNS combo"
  groups: [apt, apt34, malware]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 17}
      pipe_name: {regex: "(?i)\\\\\\\\.\\\\pipe\\\\ismdoor|oilrig"}
  alert: {title: "APT34: ISMDoor pipe"}
  enabled: true

- id: 19503
  level: 11
  description: "APT34: Karkoff modular .NET backdoor"
  groups: [apt, apt34, malware]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 1}
      image: {regex: "(?i)\\\\(karkoff|dnspionage)\\.exe"}
  alert: {title: "APT34: Karkoff backdoor"}
  enabled: true

- id: 19504
  level: 11
  description: "APT35: Charming Kitten OAuth phishing - device-code abuse"
  groups: [apt, apt35, charming_kitten, phishing]
  match:
    type: "log.file"
    fields:
      source: {equals: "azure_signin"}
      auth_protocol: {equals: "device_code"}
      app_display_name: {regex: "(?i)(microsoft graph|outlook|exchange)"}
  mitre:
    - {tactic_id: "TA0001", technique_id: "T1078.004", technique_name: "Cloud Accounts"}
  alert: {title: "APT35: device code phishing pattern"}
  enabled: true

- id: 19505
  level: 11
  description: "APT35: 'PupyRAT' Python implant python3 user-agent"
  groups: [apt, apt35, c2]
  match:
    type: "log.file"
    fields:
      user_agent: {regex: "(?i)^python-requests/2\\.|pupy"}
      dst_port: {regex: "^(80|443|8443)$"}
  alert: {title: "APT35: PupyRAT UA"}
  enabled: true

- id: 19506
  level: 12
  description: "MuddyWater: POWERSTATS PowerShell stager from Office macro"
  groups: [apt, muddywater, iran, malware]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 4104}
      script_block: {regex: "(?i)(powerstats|muddyc2go|smallflag)"}
  alert: {title: "MuddyWater: POWERSTATS"}
  enabled: true

- id: 19507
  level: 11
  description: "MuddyWater: PhonyC2 framework HTTP beacon URL pattern"
  groups: [apt, muddywater, c2]
  match:
    type: "log.file"
    fields:
      uri: {regex: "(?i)/(api|update|gateway)/[a-f0-9]{32}/(beat|cmd|out)$"}
  alert: {title: "MuddyWater: PhonyC2 URI pattern"}
  enabled: true

- id: 19508
  level: 11
  description: "MuddyWater: Atera/RMM tool installed by non-IT user"
  groups: [apt, muddywater, lotl]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 1}
      cmd: {regex: "(?i)setup_atera|atera_agent|screenconnect_setup"}
      installer_user: {regex: "(?i)(?!.*\\\\it[_-]|sysadmin).+"}
  alert: {title: "MuddyWater: RMM install by non-IT"}
  enabled: true

- id: 19509
  level: 12
  description: "Agrius: Apostle/IPsec Helper wiper-as-ransomware"
  groups: [apt, agrius, iran, wiper]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 1}
      image: {regex: "(?i)\\\\(apostle|ipsechelper|deadwood)\\.exe"}
  alert: {title: "Agrius: wiper detected"}
  enabled: true

- id: 19510
  level: 12
  description: "Pioneer Kitten: Pulse Secure / Fortinet VPN exploitation indicator"
  groups: [apt, pioneer_kitten, exploit]
  match:
    type: "log.file"
    fields:
      app: {regex: "(?i)(pulse_secure|fortigate)"}
      uri: {regex: "(?i)(\\.\\./\\.\\./|/etc/passwd|/data/etc/sslvpnd_state|cgi-bin)"}
  alert: {title: "Pioneer Kitten: VPN exploit attempt"}
  enabled: true

- id: 19511
  level: 11
  description: "APT34: SeaSharpee web shell on IIS"
  groups: [apt, apt34, webshell]
  match:
    type: "log.file"
    fields:
      source: {equals: "fim"}
      path: {regex: "(?i)\\\\inetpub\\\\.*\\\\(seasharpee|tonedeaf|valuevault)\\.(aspx|ashx)$"}
  alert: {title: "APT34: SeaSharpee web shell"}
  enabled: true

- id: 19512
  level: 11
  description: "APT35: ProxyShell (CVE-2021-34473) Exchange exploitation"
  groups: [apt, apt35, exploit]
  match:
    type: "log.file"
    fields:
      app: {equals: "exchange"}
      uri: {regex: "(?i)/autodiscover/autodiscover\\.json.*PowerShell"}
  alert: {title: "APT35: ProxyShell pattern"}
  enabled: true

- id: 19513
  level: 12
  description: "MuddyWater: SimpleHelp / RMM persistence with reverse SSH tunnel"
  groups: [apt, muddywater, persistence]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 1}

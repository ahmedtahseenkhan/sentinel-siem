- id: 19528
  level: 11
  description: "Charming Kitten: HYPERSCRAPE Telegram cookies stealer"
  groups: [apt, apt35, credential_access]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 10}
      target: {regex: "(?i)\\\\Telegram Desktop\\\\tdata"}
  alert: {title: "APT35: Telegram tdata access"}

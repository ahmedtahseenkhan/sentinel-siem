# Financial eCrime syndicates (FIN7/Carbon Spider, FIN8, FIN11, EvilCorp/Indrik Spider, ScatteredSpider/UNC3944, TA505)
# IDs 19570-19599 (30 rules)

- id: 19570
  level: 12
  description: "FIN7: CARBANAK backdoor named pipe"
  groups: [ecrime, fin7, carbanak, c2]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 17}
      pipe_name: {regex: "(?i)\\\\\\\\.\\\\pipe\\\\(carbanak|anunak|combanak)"}
  alert: {title: "FIN7: CARBANAK pipe"}
  enabled: true

- id: 19571
  level: 12
  description: "FIN7: BadUSB campaign 'LilyGO' / Arduino-based HID device"
  groups: [ecrime, fin7, hid]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 6416}
      device_class: {equals: "HID"}
      device_desc: {regex: "(?i)(arduino|leonardo|lilygo|teensy)"}
  alert: {title: "FIN7: BadUSB HID"}
  enabled: true

- id: 19572
  level: 11
  description: "FIN7: GRIFFON JS implant in %APPDATA%"
  groups: [ecrime, fin7, malware]
  match:
    type: "log.file"
    fields:
      source: {equals: "fim"}
      path: {regex: "(?i)\\\\AppData\\\\Roaming\\\\.*griffon.*\\.js$"}
  alert: {title: "FIN7: GRIFFON JS"}
  enabled: true

- id: 19573
  level: 11
  description: "FIN7: POWERTRASH PowerShell loader"
  groups: [ecrime, fin7, loader]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 4104}
      script_block: {regex: "(?i)powertrash|reflectivepe"}
  alert: {title: "FIN7: POWERTRASH loader"}
  enabled: true

- id: 19574
  level: 12
  description: "FIN8: BADHATCH backdoor C2 traffic"
  groups: [ecrime, fin8, c2]
  match:
    type: "log.file"
    fields:
      user_agent: {regex: "(?i)badhatch|sardonic"}
  alert: {title: "FIN8: BADHATCH/Sardonic UA"}
  enabled: true

- id: 19575
  level: 11
  description: "FIN8: PUNCHTRACK POS RAM scraper"
  groups: [ecrime, fin8, pos]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 10}
      target_image: {regex: "(?i)\\\\(pos|payment).*\\.exe"}
      granted_access: {regex: "0x10|0x1410"}
  alert: {title: "FIN8: POS RAM scraper access"}
  enabled: true

- id: 19576
  level: 11
  description: "FIN11: Cl0p ransomware actor identity (Cl0p shares TTPs)"
  groups: [ecrime, fin11, clop]
  match:
    type: "log.file"
    fields:
      ext_to: {regex: "\\.cl0p$"}
  correlation: {window: "5m", threshold: 20, group_by: ["host"]}
  alert: {title: "FIN11/Cl0p: encryption burst"}
  enabled: true

- id: 19577
  level: 11
  description: "FIN11: 'FlawedAmmyy' RAT TCP beacon"
  groups: [ecrime, fin11, c2]
  match:
    type: "log.file"
    fields:
      dst_port: {regex: "^(443|4434|8181)$"}
      tls_ja3: {equals: "1f1c3a37acec842c47e9d0aa7d5c9f3a"}
  alert: {title: "FIN11: FlawedAmmyy JA3"}
  enabled: true

- id: 19578
  level: 12
  description: "EvilCorp: Dridex banking trojan named scheduled task"
  groups: [ecrime, evilcorp, dridex]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 4698}
      task_command: {regex: "(?i)dridex|bitpaymer|wastedlocker"}
  alert: {title: "EvilCorp: Dridex task"}
  enabled: true

- id: 19579
  level: 12
  description: "EvilCorp: WastedLocker / Hades / Macaw ransomware file mark"
  groups: [ecrime, evilcorp, ransomware]
  match:
    type: "log.file"
    fields:
      source: {equals: "fim"}
      ext_to: {regex: "(?i)\\.(wasted|hades|macaw|phoenixcryptlocker)$"}
  alert: {title: "EvilCorp ransomware variant"}

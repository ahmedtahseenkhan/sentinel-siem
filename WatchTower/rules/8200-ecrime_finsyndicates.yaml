- id: 19580
  level: 12
  description: "Scattered Spider/UNC3944: helpdesk social engineering MFA reset"
  groups: [ecrime, scattered_spider, social_eng]
  match:
    type: "log.file"
    fields:
      source: {equals: "idp_audit"}
      operation: {regex: "(?i)mfa_reset|password_reset"}
      reset_channel: {equals: "helpdesk"}
  correlation: {window: "1h", threshold: 3, group_by: ["agent"]}
  alert: {title: "Scattered Spider: helpdesk-driven MFA reset spike"}
  enabled: true

- id: 19581
  level: 11
  description: "Scattered Spider: SIM swap notification followed by Okta login"
  groups: [ecrime, scattered_spider, identity]
  match:
    type: "log.file"
    fields:
      source: {equals: "carrier_alert"}
      event: {equals: "sim_swap"}
  correlation: {window: "30m", threshold: 1}
  alert: {title: "Scattered Spider: SIM swap"}
  enabled: true

- id: 19582
  level: 11
  description: "Scattered Spider: vSphere admin role added to compromised user"
  groups: [ecrime, scattered_spider, vmware]
  match:
    type: "logs.syslog"
    fields:
      source: {equals: "vcenter"}
      operation: {regex: "(?i)AuthorizationManager\\.AddPermission"}
      role: {regex: "(?i)admin"}
  alert: {title: "Scattered Spider: vSphere admin role grant"}
  enabled: true

- id: 19583
  level: 12
  description: "Scattered Spider: BlackCat deployed via ESXi after Okta breach"
  groups: [ecrime, scattered_spider, blackcat, esxi]
  match:
    type: "logs.syslog"
    fields:
      source: {equals: "vmware_esxi"}
      command: {regex: "(?i)chmod \\+x|rm -rf /vmfs/volumes"}
  alert: {title: "Scattered Spider: ESXi tamper"}
  enabled: true


# WatchTower — Snort / Suricata IDS Detection
# Rule IDs: 18300-18329
#
# Sources: EVE-JSON from Suricata, alert format from Snort.
# Match against `alert.signature`, `alert.signature_id`, `alert.category`,
# `alert.severity`, and full alert JSON in `message`.

rules:
  # ── Severity Tiers / Critical Alerts ─────────────────────────────────
  - id: 18300
    level: 14
    description: "Suricata — alert severity 1 (critical) fired"
    groups: [suricata, ids, critical, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"event_type\":\\s*\"alert\".*\"severity\":\\s*1"}
    mitre:
      - {tactic_id: "TA0001", technique_id: "T1190"}
    alert: {title: "Suricata: critical alert"}
    enabled: true

  - id: 18301
    level: 13
    description: "Suricata — alert severity 2 (high)"
    groups: [suricata, ids, high]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"event_type\":\\s*\"alert\".*\"severity\":\\s*2"}
    mitre: [{tactic_id: "TA0001", technique_id: "T1190"}]
    alert: {title: "Suricata: high-severity alert"}
    enabled: true

  - id: 18302
    level: 11
    description: "Suricata — sustained alert burst (high event rate)"
    groups: [suricata, ids, burst]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"event_type\":\\s*\"alert\""}
    correlation:
      window: "5m"
      threshold: 100
    mitre: [{tactic_id: "TA0007", technique_id: "T1595"}]
    alert: {title: "Suricata: alert burst"}
    enabled: true

  # ── Common Categories ───────────────────────────────────────────────
  - id: 18303
    level: 14
    description: "IDS — A Network Trojan was Detected"
    groups: [ids, malware, trojan]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"category\":\\s*\"A Network Trojan was Detected\""}
    mitre:
      - {tactic_id: "TA0011", technique_id: "T1071"}
    alert: {title: "IDS: Network Trojan"}
    enabled: true

  - id: 18304
    level: 13
    description: "IDS — Web Application Attack detected"
    groups: [ids, web_attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"category\":\\s*\"Web Application Attack\""}
    mitre: [{tactic_id: "TA0001", technique_id: "T1190"}]
    alert: {title: "IDS: Web Application Attack"}
    enabled: true

  - id: 18305
    level: 14
    description: "IDS — Exploit Kit Activity detected"
    groups: [ids, exploit_kit]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"category\":\\s*\"Exploit Kit Activity Detected\""}
    mitre:
      - {tactic_id: "TA0001", technique_id: "T1189"}
    alert: {title: "IDS: Exploit kit activity"}
    enabled: true

  - id: 18306
    level: 14
    description: "IDS — Crypto Currency Mining Activity"
    groups: [ids, mining, cryptominer]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"category\":\\s*\"Crypto Currency Mining\""}
    mitre:
      - {tactic_id: "TA0040", technique_id: "T1496"}
    alert: {title: "IDS: cryptomining"}
    enabled: true

  - id: 18307
    level: 13
    description: "IDS — Attempted Information Leak"
    groups: [ids, infoleak]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"category\":\\s*\"Attempted Information Leak\""}
    mitre: [{tactic_id: "TA0009", technique_id: "T1213"}]
    alert: {title: "IDS: information leak attempt"}
    enabled: true

  - id: 18308
    level: 13
    description: "IDS — Potential Corporate Privacy Violation (data exfil)"
    groups: [ids, dlp]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"category\":\\s*\"Potential Corporate Privacy Violation\""}
    mitre: [{tactic_id: "TA0010", technique_id: "T1567"}]
    alert: {title: "IDS: corporate privacy violation"}
    enabled: true

  - id: 18309
    level: 13
    description: "IDS — Attempted Administrator Privilege Gain"
    groups: [ids, privilege_escalation]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"category\":\\s*\"Attempted Administrator Privilege Gain\""}
    mitre: [{tactic_id: "TA0004", technique_id: "T1068"}]
    alert: {title: "IDS: admin privilege gain attempt"}
    enabled: true

  - id: 18310
    level: 13
    description: "IDS — Successful Administrator Privilege Gain"
    groups: [ids, privilege_escalation, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"category\":\\s*\"Successful Administrator Privilege Gain\""}
    mitre: [{tactic_id: "TA0004", technique_id: "T1068"}]
    alert: {title: "IDS: admin privilege gain SUCCESS"}
    enabled: true

  # ── Signature Pattern Matches ────────────────────────────────────────
  - id: 18311
    level: 14
    description: "IDS — Cobalt Strike Beacon signature"
    groups: [ids, cobalt_strike, c2]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*Cobalt Strike\""}
    mitre:
      - {tactic_id: "TA0011", technique_id: "T1071.001"}
    alert: {title: "IDS: Cobalt Strike Beacon"}
    enabled: true

  - id: 18312
    level: 14
    description: "IDS — Meterpreter signature"
    groups: [ids, meterpreter, c2]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*Meterpreter\""}
    mitre:
      - {tactic_id: "TA0011", technique_id: "T1059"}
    alert: {title: "IDS: Meterpreter"}
    enabled: true

  - id: 18313
    level: 14
    description: "IDS — Sliver / Mythic / Empire / Brute Ratel signature"
    groups: [ids, c2_framework]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*(Sliver|Mythic|Empire|Brute Ratel|Havoc|Posh)\""}
    mitre: [{tactic_id: "TA0011", technique_id: "T1071"}]
    alert: {title: "IDS: Offensive-C2 framework"}
    enabled: true

  - id: 18314
    level: 14
    description: "IDS — Ransomware signature (known family — Conti, LockBit, Ryuk, etc.)"
    groups: [ids, ransomware]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*(Ransomware|Conti|LockBit|Ryuk|REvil|Maze|Sodinokibi|BlackCat|ALPHV|Royal|Hive)\""}
    mitre:
      - {tactic_id: "TA0040", technique_id: "T1486"}
    alert: {title: "IDS: ransomware family signature"}
    enabled: true

  - id: 18315
    level: 14
    description: "IDS — Log4Shell exploit signature"
    groups: [ids, log4shell, cve_2021_44228, rce]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*(Log4Shell|CVE-2021-44228|JNDI Injection)\""}
    mitre:
      - {tactic_id: "TA0001", technique_id: "T1190"}
    alert: {title: "IDS: Log4Shell"}
    enabled: true

  - id: 18316
    level: 14
    description: "IDS — EternalBlue / SMB exploit signature"
    groups: [ids, eternalblue, smb_exploit]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*(EternalBlue|MS17-010|SMB.*exploit)\""}
    mitre:
      - {tactic_id: "TA0008", technique_id: "T1210"}
    alert: {title: "IDS: EternalBlue / SMB exploit"}
    enabled: true

  - id: 18317
    level: 14
    description: "IDS — PrintNightmare (CVE-2021-1675 / 34527) signature"
    groups: [ids, printnightmare, privilege_escalation]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*(PrintNightmare|CVE-2021-1675|CVE-2021-34527)\""}
    mitre: [{tactic_id: "TA0004", technique_id: "T1068"}]
    alert: {title: "IDS: PrintNightmare"}
    enabled: true

  - id: 18318
    level: 14
    description: "IDS — Zerologon (CVE-2020-1472) signature"
    groups: [ids, zerologon, privilege_escalation, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*(Zerologon|CVE-2020-1472)\""}
    mitre:
      - {tactic_id: "TA0004", technique_id: "T1068"}
    alert: {title: "IDS: Zerologon"}
    enabled: true

  - id: 18319
    level: 14
    description: "IDS — ProxyShell / ProxyLogon / ProxyNotShell signature"
    groups: [ids, exchange_exploit, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*(ProxyShell|ProxyLogon|ProxyNotShell|CVE-2021-26855|CVE-2022-41040)\""}
    mitre:
      - {tactic_id: "TA0001", technique_id: "T1190"}
    alert: {title: "IDS: Exchange Proxy* exploit"}
    enabled: true

  - id: 18320
    level: 13
    description: "IDS — RDP brute force signature"
    groups: [ids, rdp, brute_force]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*RDP.*(Brute Force|Login Attempt|NLA Bypass)\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1110.001"}]
    alert: {title: "IDS: RDP brute force signature"}
    enabled: true

  - id: 18321
    level: 13
    description: "IDS — SSH brute force signature"
    groups: [ids, ssh, brute_force]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*SSH.*(Brute Force|Scan)\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1110.001"}]
    alert: {title: "IDS: SSH brute force signature"}
    enabled: true

  # ── DNS / Network Anomalies ──────────────────────────────────────────
  - id: 18322
    level: 13
    description: "IDS — DNS tunneling signature (TXT / NXDOMAIN flood / long subdomain)"
    groups: [ids, dns_tunnel, exfiltration]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*(DNS Tunnel|DNS Exfil|DNSCAT|Iodine|dns2tcp)\""}
    mitre: [{tactic_id: "TA0011", technique_id: "T1071.004"}]
    alert: {title: "IDS: DNS tunneling"}
    enabled: true

  - id: 18323
    level: 13
    description: "IDS — DGA-generated domain query"
    groups: [ids, dga]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*DGA\""}
    mitre: [{tactic_id: "TA0011", technique_id: "T1568.002"}]
    alert: {title: "IDS: DGA-domain query"}
    enabled: true

  - id: 18324
    level: 13
    description: "IDS — Tor / I2P / VPN tunnel detected"
    groups: [ids, anonymizer]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"signature\":\\s*\".*(Tor|I2P|OpenVPN|WireGuard|Shadowsocks|V2Ray)\""}
    mitre: [{tactic_id: "TA0011", technique_id: "T1090.003"}]
    alert: {title: "IDS: anonymizer / consumer VPN"}
    enabled: true

  # ── File / Malware ───────────────────────────────────────────────────
  - id: 18325
    level: 13
    description: "Suricata — file extraction / md5 match against known malware hash"
    groups: [suricata, file_match, malware]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"event_type\":\\s*\"fileinfo\".*\"md5\":\\s*\"[a-f0-9]{32}\""}
      enrich:
        ti_source: "malicious_hashes"
    mitre: [{tactic_id: "TA0001", technique_id: "T1204.002"}]
    alert: {title: "Suricata: file md5 matches TI"}
    enabled: true

  - id: 18326
    level: 13
    description: "Suricata — TLS JA3 fingerprint matches known malware"
    groups: [suricata, ja3, c2]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"event_type\":\\s*\"tls\".*\"ja3\":"}
      enrich:
        ti_source: "ja3_malicious"
    mitre: [{tactic_id: "TA0011", technique_id: "T1573"}]
    alert: {title: "Suricata: JA3 matches malware"}
    enabled: true

  - id: 18327
    level: 13
    description: "Suricata — TLS self-signed cert observed outside whitelist"
    groups: [suricata, tls, self_signed]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"event_type\":\\s*\"tls\".*\"self_signed\":\\s*true"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1553"}]
    alert: {title: "Suricata: self-signed TLS cert"}
    enabled: true

  # ── Engine / Health ──────────────────────────────────────────────────
  - id: 18328
    level: 13
    description: "Suricata — engine stats: drops > 1% (packet loss / overload)"
    groups: [suricata, engine_health]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"event_type\":\\s*\"stats\".*\"drop\":\\s*([1-9]\\d{2,}|[1-9]\\d{0,1}\\.\\d+)"}
    mitre: [{tactic_id: "TA0040", technique_id: "T1499"}]
    alert: {title: "Suricata: packet drops"}
    enabled: true

  - id: 18329
    level: 14
    description: "Suricata — engine stopped / not running"
    groups: [suricata, engine_down, defense_evasion, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)(suricata\\.service.*stopped|suricata.*signal.*(11|15)|engine shutting down)"}
    mitre:
      - {tactic_id: "TA0005", technique_id: "T1562.001"}
    alert: {title: "Suricata: engine stopped"}
    enabled: true

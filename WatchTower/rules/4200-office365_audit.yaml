    alert: {title: "O365: Service principal credentials added"}
    enabled: true

  - id: 16218
    level: 13
    description: "O365 — owner added to application (persistence)"
    groups: [o365, azure_ad, app_owner, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Add owner to application\""}
    mitre: [{tactic_id: "TA0003", technique_id: "T1098"}]
    alert: {title: "O365: Owner added to application"}
    enabled: true

  - id: 16219
    level: 14
    description: "O365 — federation/SAML token signing cert changed (Golden SAML)"
    groups: [o365, azure_ad, saml, golden_saml, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Set federation settings on domain\""}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1606.002"}
    alert: {title: "O365: Federation settings modified (Golden SAML)"}
    enabled: true

  - id: 16220
    level: 14
    description: "O365 — new domain federated to external IdP (trust abuse)"
    groups: [o365, azure_ad, federation, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Set domain authentication\""}
    mitre: [{tactic_id: "TA0008", technique_id: "T1484.002"}]
    alert: {title: "O365: Domain authentication setting changed"}
    enabled: true

  # ── Exchange Online Operations ────────────────────────────────────────
  - id: 16221
    level: 14
    description: "O365 — Set-Mailbox forwarding to external address"
    groups: [o365, exchange_online, mail_forwarding, exfiltration, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Set-Mailbox\".*ForwardingSmtpAddress"}
    mitre:
      - {tactic_id: "TA0010", technique_id: "T1114.003"}
    alert: {title: "O365: Mailbox forwarding to external"}
    enabled: true

  - id: 16222
    level: 13
    description: "O365 — New-InboxRule forwarding/moving messages"
    groups: [o365, exchange_online, inbox_rule, exfiltration]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"New-InboxRule\""}
    mitre: [{tactic_id: "TA0010", technique_id: "T1114.003"}]
    alert: {title: "O365: New inbox rule"}
    enabled: true

  - id: 16223
    level: 13
    description: "O365 — Add-MailboxPermission granting FullAccess"
    groups: [o365, exchange_online, mailbox_permission, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Add-MailboxPermission\".*FullAccess"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1098.002"}]
    alert: {title: "O365: Mailbox FullAccess granted"}
    enabled: true

  - id: 16224
    level: 13
    description: "O365 — New-TransportRule"
    groups: [o365, exchange_online, transport_rule, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"New-TransportRule\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1564.008"}]
    alert: {title: "O365: New TransportRule"}
    enabled: true

  - id: 16225
    level: 13
    description: "O365 — eDiscovery / Search created (compliance recon)"
    groups: [o365, ediscovery, recon]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*(\"New-ComplianceSearch\"|\"Search-Mailbox\")"}
    mitre: [{tactic_id: "TA0009", technique_id: "T1114.002"}]
    alert: {title: "O365: eDiscovery / mailbox search"}
    enabled: true

  - id: 16226
    level: 13
    description: "O365 — mailbox audit log bypass added"
    groups: [o365, exchange_online, audit_tampering, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Set-MailboxAuditBypassAssociation\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.002"}]
    alert: {title: "O365: Mailbox audit bypass added"}
    enabled: true

  - id: 16227
    level: 13
    description: "O365 — Set-AdminAuditLogConfig disabled"
    groups: [o365, exchange_online, audit_tampering, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Set-AdminAuditLogConfig\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.002"}]
    alert: {title: "O365: Admin audit log config changed"}
    enabled: true

  # ── SharePoint / OneDrive ─────────────────────────────────────────────
  - id: 16228
    level: 12
    description: "O365 — anonymous link created on SharePoint/OneDrive file"
    groups: [o365, sharepoint, onedrive, anonymous_share, exfiltration]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*(\"AnonymousLinkCreated\"|\"AnonymousLinkUsed\")"}
    mitre:
      - {tactic_id: "TA0010", technique_id: "T1567.002"}
    alert: {title: "O365: Anonymous link created/used"}
    enabled: true

  - id: 16229
    level: 13
    description: "O365 — bulk file download from SharePoint/OneDrive (>50 files in 5m)"
    groups: [o365, sharepoint, onedrive, bulk_download, exfiltration]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"FileDownloaded\""}
    correlation:
      window: "5m"
      threshold: 50
    mitre: [{tactic_id: "TA0010", technique_id: "T1567.002"}]
    alert: {title: "O365: Bulk SharePoint/OneDrive download"}
    enabled: true

  - id: 16230
    level: 13
    description: "O365 — bulk file deletion from SharePoint/OneDrive"
    groups: [o365, sharepoint, onedrive, bulk_delete, impact]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"FileDeleted\""}
    correlation:
      window: "5m"
      threshold: 50
    mitre: [{tactic_id: "TA0040", technique_id: "T1485"}]
    alert: {title: "O365: Bulk SharePoint/OneDrive deletion"}
    enabled: true

  - id: 16231
    level: 12
    description: "O365 — sharing policy changed to allow external"
    groups: [o365, sharepoint, sharing_policy, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"SharingPolicyChanged\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001"}]
    alert: {title: "O365: Sharing policy changed"}
    enabled: true

  - id: 16232
    level: 13
    description: "O365 — sensitive file shared externally (DLP signal)"
    groups: [o365, sharepoint, dlp, exfiltration]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"DLPRuleMatch\""}
    mitre: [{tactic_id: "TA0010", technique_id: "T1567"}]
    alert: {title: "O365: DLP rule match"}
    enabled: true

  - id: 16233
    level: 12
    description: "O365 — site collection ownership transfer (persistence)"
    groups: [o365, sharepoint, ownership_transfer, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"SiteCollectionAdminAdded\""}
    mitre: [{tactic_id: "TA0003", technique_id: "T1098"}]
    alert: {title: "O365: Site collection admin added"}
    enabled: true

  # ── Teams ─────────────────────────────────────────────────────────────
  - id: 16234
    level: 12
    description: "O365 — Teams external federation enabled"
    groups: [o365, teams, federation]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"TeamsTenantSettingChanged\".*AllowFederatedUsers"}
    mitre: [{tactic_id: "TA0001", technique_id: "T1199"}]
    alert: {title: "O365: Teams external federation toggled"}
    enabled: true

  - id: 16235
    level: 13
    description: "O365 — external user added to Teams channel"
    groups: [o365, teams, external_user, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"MemberAdded\".*\"UserType\":\\s*\"Guest\""}
    mitre: [{tactic_id: "TA0003", technique_id: "T1136.003"}]
    alert: {title: "O365: Guest user added to Teams"}
    enabled: true

  - id: 16236
    level: 13
    description: "O365 — Teams bot installed across tenant"
    groups: [o365, teams, app_install, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"AppInstalled\""}
    mitre: [{tactic_id: "TA0003", technique_id: "T1505"}]
    alert: {title: "O365: Teams app/bot installed"}
    enabled: true

  - id: 16237
    level: 12
    description: "O365 — chat message edited / deleted by admin (cover-up)"
    groups: [o365, teams, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*(\"MessageHostedContentDeleted\"|\"MessageHostedContentUpdated\")"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1070"}]
    alert: {title: "O365: Teams message hosted content deleted/updated"}
    enabled: true

  # ── Microsoft Flow / Power Automate ───────────────────────────────────
  - id: 16238
    level: 13
    description: "O365 — Power Automate flow created with HTTP/external action"
    groups: [o365, power_automate, persistence, exfiltration]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"CreateFlow\""}
    mitre:
      - {tactic_id: "TA0010", technique_id: "T1567"}
    alert: {title: "O365: Power Automate flow created"}
    enabled: true

  # ── Compliance / Discovery ────────────────────────────────────────────
  - id: 16239
    level: 14
    description: "O365 — retention policy deleted (evidence destruction)"
    groups: [o365, compliance, retention, defense_evasion, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Remove-RetentionCompliancePolicy\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1070"}]
    alert: {title: "O365: Retention compliance policy removed"}
    enabled: true

  - id: 16240
    level: 13
    description: "O365 — sensitivity / classification label removed from file"
    groups: [o365, compliance, sensitivity_label, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"SensitivityLabelRemoved\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001"}]
    alert: {title: "O365: Sensitivity label removed"}
    enabled: true

  # ── Mailbox / Item Access ─────────────────────────────────────────────
  - id: 16241
    level: 11
    description: "O365 — mailbox accessed by another user (delegate access)"
    groups: [o365, mailbox_access, recon]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"MailItemsAccessed\""}
    mitre: [{tactic_id: "TA0009", technique_id: "T1114.002"}]
    alert: {title: "O365: MailItemsAccessed (delegate)"}
    enabled: true

  - id: 16242
    level: 13
    description: "O365 — mass MailItemsAccessed from one identity (mailbox scrape)"
    groups: [o365, mailbox_access, exfiltration]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"MailItemsAccessed\""}
    correlation:
      window: "10m"
      threshold: 100
    mitre: [{tactic_id: "TA0010", technique_id: "T1114.002"}]
    alert: {title: "O365: Mass mailbox item access (scrape)"}
    enabled: true

  - id: 16243
    level: 11
    description: "O365 — Send / Reply by non-owner via delegate"
    groups: [o365, mailbox_send_as, impersonation]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"SendAs\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1098.002"}]
    alert: {title: "O365: SendAs delegate use"}
    enabled: true

  - id: 16244
    level: 11
    description: "O365 — SendOnBehalf delegate use"
    groups: [o365, mailbox_send_on_behalf, impersonation]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"SendOnBehalf\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1098.002"}]
    alert: {title: "O365: SendOnBehalf delegate use"}
    enabled: true

  # ── Suspicious sign-in geographies / IPs ──────────────────────────────
  - id: 16245
    level: 11
    description: "O365 — sign-in from new country for user"
    groups: [o365, geo_anomaly, signin]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"UserLoggedIn\".*\"Country\":"}
    enrich:
      baseline: "user.country"
    mitre: [{tactic_id: "TA0006", technique_id: "T1078.004"}]
    alert: {title: "O365: Sign-in from new country"}
    enabled: true

  - id: 16246
    level: 12
    description: "O365 — sign-in from hosting / VPN ASN"
    groups: [o365, hosting_provider, asn]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"ClientIP\":\\s*\"\\d+\\.\\d+\\.\\d+\\.\\d+\""}
      enrich:
        asn_classification: "hosting|vpn"
    mitre: [{tactic_id: "TA0011", technique_id: "T1090"}]
    alert: {title: "O365: Sign-in from hosting/VPN ASN"}
    enabled: true

  - id: 16247
    level: 13
    description: "O365 — sign-in success then suspicious app consent within 10m (token theft)"
    groups: [o365, illicit_consent, token_theft, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Consent to application\""}
    correlation:
      window: "10m"
      threshold: 1
      precondition_match:
        regex: "\"Operation\":\\s*\"UserLoggedIn\""
        precondition_count: 1
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1528"}
    alert: {title: "O365: Consent shortly after sign-in"}
    enabled: true

  # ── App / Workload Misuse ─────────────────────────────────────────────
  - id: 16248
    level: 13
    description: "O365 — Microsoft Graph PowerShell module used unusually (token scrape)"
    groups: [o365, graph, recon]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"ApplicationDisplayName\":\\s*\"Microsoft Graph PowerShell\""}
    correlation:
      window: "10m"
      threshold: 50

# WatchTower — Office 365 / Microsoft 365 Audit Log Detection
# Rule IDs: 16200-16259
#
# Source: O365 unified audit log (via Microsoft Graph / Management Activity
# API) ingested by a cloud connector. Each event carries fields:
#   - Workload         (AzureActiveDirectory, Exchange, SharePoint, OneDrive,
#                       Teams, MicrosoftTeams, SecurityComplianceCenter,
#                       MicrosoftFlow, PowerBI, ThreatIntelligence, ...)
#   - Operation        (e.g. "UserLoggedIn", "FileUploaded", "Add-MailboxPermission")
#   - UserId, ClientIP, UserType, ResultStatus, ObjectId, Subject
#
# Note: these rules expect ingestion to map JSON keys directly. If you feed
# them via raw JSON in `message`, the regex still matches.

rules:
  # ── Authentication / Identity (Azure AD / Entra) ──────────────────────
  - id: 16200
    level: 12
    description: "O365 — risky sign-in flagged by Identity Protection"
    groups: [o365, azure_ad, identity_protection, risky_signin]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"riskLevelDuringSignIn\":\\s*\"(medium|high)\""}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1078.004"}
    alert: {title: "O365: Risky sign-in (medium/high)"}
    enabled: true

  - id: 16201
    level: 13
    description: "O365 — impossible-travel sign-in detected"
    groups: [o365, azure_ad, impossible_travel, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"riskEventTypes\":.*\"unfamiliarFeatures|impossibleTravel\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1078.004"}]
    alert: {title: "O365: Impossible travel sign-in"}
    enabled: true

  - id: 16202
    level: 12
    description: "O365 — sign-in from anonymous IP (Tor / VPN)"
    groups: [o365, azure_ad, anonymizer]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"riskEventTypes\":.*\"anonymizedIPAddress\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1078.004"}]
    alert: {title: "O365: Sign-in from anonymous IP"}
    enabled: true

  - id: 16203
    level: 13
    description: "O365 — sign-in failure burst (password spray)"
    groups: [o365, azure_ad, password_spray, brute_force]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"UserLoginFailed\""}
    correlation:
      window: "10m"
      threshold: 30
      distinct: ["agent_name"]
    mitre: [{tactic_id: "TA0006", technique_id: "T1110.003"}]
    alert: {title: "O365: Password spray (failed logins many users)"}
    enabled: true

  - id: 16204
    level: 12
    description: "O365 — MFA fatigue (many MFA challenges, eventual success)"
    groups: [o365, azure_ad, mfa, mfa_fatigue, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"UserLoggedIn\""}
    correlation:
      window: "10m"
      threshold: 1
      precondition_match:
        regex: "\"Operation\":\\s*\"UserStrongAuthClientAuthNRequiredInterrupt|UserStrongAuthClientAuthNRequired"
        precondition_count: 5
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1621"}
    alert: {title: "O365: MFA fatigue success suspect"}
    enabled: true

  - id: 16205
    level: 13
    description: "O365 — legacy auth protocol used (POP/IMAP/SMTP basic auth)"
    groups: [o365, azure_ad, legacy_auth, deprecated]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"ClientAppUsed\":\\s*\"(IMAP4|POP3|Authenticated SMTP|Other clients|Exchange Web Services)\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1078.004"}]
    alert: {title: "O365: Legacy auth protocol sign-in"}
    enabled: true

  - id: 16206
    level: 13
    description: "O365 — admin role assigned (Global Admin / Privileged Role Admin / Exchange Admin)"
    groups: [o365, azure_ad, role_assignment, privilege_escalation, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Add member to role\\.|AssignDirectoryRole|Add eligible member to role\""}
    mitre:
      - {tactic_id: "TA0004", technique_id: "T1098"}
    alert: {title: "O365: Admin role assigned"}
    enabled: true

  - id: 16207
    level: 14
    description: "O365 — Global Administrator role granted"
    groups: [o365, azure_ad, global_admin, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)Add member to role.*\"Role.DisplayName\":\\s*\"Global Administrator\""}
    mitre: [{tactic_id: "TA0004", technique_id: "T1098"}]
    alert: {title: "O365: Global Administrator role granted"}
    enabled: true

  - id: 16208
    level: 13
    description: "O365 — eligible-role activated (PIM elevation)"
    groups: [o365, azure_ad, pim, privilege_escalation]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Activate eligible role\""}
    mitre: [{tactic_id: "TA0004", technique_id: "T1098"}]
    alert: {title: "O365: PIM role activated"}
    enabled: true

  - id: 16209
    level: 12
    description: "O365 — new user created"
    groups: [o365, azure_ad, account_creation]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Add user\\.\""}
    mitre: [{tactic_id: "TA0003", technique_id: "T1136"}]
    alert: {title: "O365: New user created"}
    enabled: true

  - id: 16210
    level: 12
    description: "O365 — user account deleted"
    groups: [o365, azure_ad, account_deletion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Delete user\\.\""}
    mitre: [{tactic_id: "TA0040", technique_id: "T1531"}]
    alert: {title: "O365: User deleted"}
    enabled: true

  - id: 16211
    level: 13
    description: "O365 — MFA disabled or method reset for user"
    groups: [o365, azure_ad, mfa, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*(\"Disable Strong Authentication\\.\"|\"Reset user password\\.\"|\"User registered all required security info\")"}
    mitre:
      - {tactic_id: "TA0005", technique_id: "T1556"}
    alert: {title: "O365: MFA disabled / reset"}
    enabled: true

  - id: 16212
    level: 14
    description: "O365 — conditional access policy disabled / deleted"
    groups: [o365, azure_ad, conditional_access, defense_evasion, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*(\"Delete conditional access policy\"|\"Disable policy\")"}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001"}]
    alert: {title: "O365: Conditional Access policy disabled/deleted"}
    enabled: true

  - id: 16213
    level: 13
    description: "O365 — conditional access policy modified"
    groups: [o365, azure_ad, conditional_access, defense_evasion]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Update conditional access policy\""}
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001"}]
    alert: {title: "O365: Conditional Access policy modified"}
    enabled: true

  # ── Service Principal / App Registration Abuse ────────────────────────
  - id: 16214
    level: 13
    description: "O365 — new app registration with high-privilege scope"
    groups: [o365, azure_ad, app_registration, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Add application\""}
    mitre: [{tactic_id: "TA0003", technique_id: "T1098.001"}]
    alert: {title: "O365: New app registration"}
    enabled: true

  - id: 16215
    level: 14
    description: "O365 — application consent grant (illicit consent attack)"
    groups: [o365, azure_ad, illicit_consent, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Consent to application\""}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1528"}
    alert: {title: "O365: Application consent granted (review scopes)"}
    enabled: true

  - id: 16216
    level: 13
    description: "O365 — admin consent granted on app"
    groups: [o365, azure_ad, admin_consent, persistence]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Add app role assignment grant to user\""}
    mitre: [{tactic_id: "TA0003", technique_id: "T1098.001"}]
    alert: {title: "O365: App role assignment (admin consent)"}
    enabled: true

  - id: 16217
    level: 14
    description: "O365 — service principal credentials added (backdoor)"
    groups: [o365, azure_ad, service_principal, persistence, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)\"Operation\":\\s*\"Add service principal credentials\""}

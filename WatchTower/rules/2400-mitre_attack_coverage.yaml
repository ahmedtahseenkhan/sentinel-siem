# WatchTower - MITRE ATT&CK Comprehensive Coverage Rules
# Rule IDs: 12000-12299
# One detection rule per major MITRE ATT&CK technique across all tactics:
# Initial Access, Execution, Persistence, Privilege Escalation, Defense Evasion,
# Credential Access, Discovery, Lateral Movement, Collection, C2, Exfiltration, Impact

rules:
  # ── TA0001 Initial Access ─────────────────────────────────────────────────

  - id: 12001
    level: 10
    description: "T1078 — Valid Accounts: Suspicious login activity"
    groups: [mitre, initial_access, valid_accounts]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4624
        win_LogonType:
          regex: "^(3|10)$"
    mitre: [{tactic_id: "TA0001", technique_id: "T1078", technique_name: "Valid Accounts"}]
    alert: {title: "MITRE T1078: Valid account login detected"}
    enabled: true

  - id: 12002
    level: 11
    description: "T1190 — Exploit Public-Facing Application: Anomalous service crash"
    groups: [mitre, initial_access, exploit]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 1000
    mitre: [{tactic_id: "TA0001", technique_id: "T1190", technique_name: "Exploit Public-Facing Application"}]
    alert: {title: "MITRE T1190: Application crash (possible exploit)"}
    enabled: true

  - id: 12003
    level: 11
    description: "T1133 — External Remote Services: RDP/SSH from new IP"
    groups: [mitre, initial_access, remote_services]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4624
        win_LogonType:
          value: "10"
    mitre: [{tactic_id: "TA0001", technique_id: "T1133", technique_name: "External Remote Services"}]
    alert: {title: "MITRE T1133: External remote service login"}
    enabled: true

  - id: 12004
    level: 10
    description: "T1566 — Phishing: Office spawned suspicious child"
    groups: [mitre, initial_access, phishing]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(winword|excel|powerpnt|outlook)\\.exe.*(cmd|powershell|wscript|cscript|mshta)"
    mitre: [{tactic_id: "TA0001", technique_id: "T1566.001", technique_name: "Phishing: Spearphishing Attachment"}]
    alert: {title: "MITRE T1566: Office spawned suspicious child process"}
    enabled: true

  - id: 12005
    level: 10
    description: "T1091 — Replication Through Removable Media"
    groups: [mitre, initial_access, removable_media]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 6416
    mitre: [{tactic_id: "TA0001", technique_id: "T1091", technique_name: "Replication Through Removable Media"}]
    alert: {title: "MITRE T1091: External device connected"}
    enabled: true

  # ── TA0002 Execution ──────────────────────────────────────────────────────

  - id: 12010
    level: 8
    description: "T1059.001 — PowerShell command line"
    groups: [mitre, execution, powershell]
    match:
      type: "process.new"
      fields:
        name:
          regex: "(?i)powershell(_ise)?\\.exe"
    mitre: [{tactic_id: "TA0002", technique_id: "T1059.001", technique_name: "Command and Scripting Interpreter: PowerShell"}]
    alert: {title: "MITRE T1059.001: PowerShell execution"}
    enabled: true

  - id: 12011
    level: 7
    description: "T1059.003 — Windows Command Shell"
    groups: [mitre, execution, cmd]
    match:
      type: "process.new"
      fields:
        name:
          regex: "(?i)^cmd\\.exe$"
    mitre: [{tactic_id: "TA0002", technique_id: "T1059.003", technique_name: "Command and Scripting Interpreter: Windows Command Shell"}]
    alert: {title: "MITRE T1059.003: cmd.exe execution"}
    enabled: true

  - id: 12012
    level: 9
    description: "T1059.005 — Visual Basic script execution"
    groups: [mitre, execution, vbscript]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(wscript|cscript)\\.exe.*\\.(vbs|vbe|js|jse|wsf)"
    mitre: [{tactic_id: "TA0002", technique_id: "T1059.005", technique_name: "Command and Scripting Interpreter: Visual Basic"}]
    alert: {title: "MITRE T1059.005: VBScript/JScript execution"}
    enabled: true

  - id: 12013
    level: 11
    description: "T1059.007 — JavaScript/JScript via MSHTA"
    groups: [mitre, execution, lolbin]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)mshta\\.exe.*(javascript:|vbscript:|http)"
    mitre: [{tactic_id: "TA0002", technique_id: "T1218.005", technique_name: "System Binary Proxy Execution: Mshta"}]
    alert: {title: "MITRE T1218.005: MSHTA LOLBin execution"}
    enabled: true

  - id: 12014
    level: 9
    description: "T1053.005 — Scheduled task via schtasks"
    groups: [mitre, execution, persistence, scheduled_task]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)schtasks.*/create"
    mitre: [{tactic_id: "TA0002", technique_id: "T1053.005", technique_name: "Scheduled Task/Job: Scheduled Task"}]
    alert: {title: "MITRE T1053.005: Scheduled task created"}
    enabled: true

  - id: 12015
    level: 12
    description: "T1204.002 — User Execution of malicious file"
    groups: [mitre, execution, user_execution]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(downloads|temp|appdata).*\\.(exe|scr|js|vbs|ps1|hta|cpl)"
    mitre: [{tactic_id: "TA0002", technique_id: "T1204.002", technique_name: "User Execution: Malicious File"}]
    alert: {title: "MITRE T1204.002: Suspicious file execution from user dir"}
    enabled: true

  - id: 12016
    level: 11
    description: "T1106 — Native API: Windows API used for injection"
    groups: [mitre, execution, injection]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(reflection\\.assembly|virtualalloc|writeprocessmemory|createremotethread)"
    mitre: [{tactic_id: "TA0002", technique_id: "T1106", technique_name: "Native API"}]
    alert: {title: "MITRE T1106: Native API injection indicators"}
    enabled: true

  - id: 12017
    level: 10
    description: "T1569.002 — Service Execution via sc.exe"
    groups: [mitre, execution, service]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)sc(\\.exe)?\\s+(create|start|config).*binPath"
    mitre: [{tactic_id: "TA0002", technique_id: "T1569.002", technique_name: "System Services: Service Execution"}]
    alert: {title: "MITRE T1569.002: Service execution"}
    enabled: true

  - id: 12018
    level: 10
    description: "T1047 — Windows Management Instrumentation"
    groups: [mitre, execution, wmi]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)wmic.*(process\\s+call\\s+create|/node:)"
    mitre: [{tactic_id: "TA0002", technique_id: "T1047", technique_name: "Windows Management Instrumentation"}]
    alert: {title: "MITRE T1047: WMI remote execution"}
    enabled: true

  - id: 12019
    level: 9
    description: "T1059.004 — Unix Shell execution"
    groups: [mitre, execution, unix]
    match:
      type: "process.new"
      fields:
        name:
          regex: "^(bash|sh|zsh|csh|ksh|dash|fish)$"
        cmdline:
          regex: "(?i)(curl\\s+.*\\||wget\\s+.*\\||nc\\s+-e|bash\\s+-i)"
    mitre: [{tactic_id: "TA0002", technique_id: "T1059.004", technique_name: "Command and Scripting Interpreter: Unix Shell"}]
    alert: {title: "MITRE T1059.004: Suspicious Unix shell command"}
    enabled: true

  # ── TA0003 Persistence ────────────────────────────────────────────────────

  - id: 12030
    level: 11
    description: "T1547.001 — Registry Run Key persistence"
    groups: [mitre, persistence, registry]
    match:
      type: "registry.value_added"
      fields:
        key:
          regex: "(?i)(\\\\Run\\\\|\\\\RunOnce\\\\|CurrentVersion\\\\Run)"
    mitre: [{tactic_id: "TA0003", technique_id: "T1547.001", technique_name: "Registry Run Keys / Startup Folder"}]
    alert: {title: "MITRE T1547.001: Registry run key added"}
    enabled: true

  - id: 12031
    level: 11
    description: "T1543.003 — Windows Service persistence"
    groups: [mitre, persistence, service]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 7045
    mitre: [{tactic_id: "TA0003", technique_id: "T1543.003", technique_name: "Create or Modify System Process: Windows Service"}]
    alert: {title: "MITRE T1543.003: New Windows service installed"}
    enabled: true

  - id: 12032
    level: 12
    description: "T1546.003 — WMI Event Subscription persistence"
    groups: [mitre, persistence, wmi]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)wmic.*(ActiveScriptEventConsumer|__EventFilter|__FilterToConsumerBinding)"
    mitre: [{tactic_id: "TA0003", technique_id: "T1546.003", technique_name: "Event Triggered Execution: WMI Event Subscription"}]
    alert: {title: "MITRE T1546.003: WMI event subscription created"}
    enabled: true

  - id: 12033
    level: 12
    description: "T1136.001 — Create local account"
    groups: [mitre, persistence, account]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)net\\s+user.*\\s+(/add|/active:yes)"
    mitre: [{tactic_id: "TA0003", technique_id: "T1136.001", technique_name: "Create Account: Local Account"}]
    alert: {title: "MITRE T1136.001: Local account created via net user"}
    enabled: true

  - id: 12034
    level: 11
    description: "T1574.002 — DLL Side-Loading detected"
    groups: [mitre, persistence, dll]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 7
        win_ImageLoaded:
          regex: "(?i)\\\\(Users|Temp|AppData)\\\\.+\\.dll$"
    mitre: [{tactic_id: "TA0003", technique_id: "T1574.002", technique_name: "Hijack Execution Flow: DLL Side-Loading"}]
    alert: {title: "MITRE T1574.002: DLL loaded from user directory"}
    enabled: true

  - id: 12035
    level: 11
    description: "T1547.004 — Winlogon Helper DLL"
    groups: [mitre, persistence, winlogon]
    match:
      type: "registry.value_added"
      fields:
        key:
          regex: "(?i)Winlogon\\\\(Userinit|Shell|Notify)"
    mitre: [{tactic_id: "TA0003", technique_id: "T1547.004", technique_name: "Boot or Logon Autostart Execution: Winlogon Helper DLL"}]
    alert: {title: "MITRE T1547.004: Winlogon registry modified"}
    enabled: true

  - id: 12036
    level: 12
    description: "T1505.003 — Web shell deployed"
    groups: [mitre, persistence, web_shell]
    match:
      type: "fim.added"
      fields:
        path:
          regex: "(?i)\\.(aspx|asp|jsp|php|cfm)$"
    mitre: [{tactic_id: "TA0003", technique_id: "T1505.003", technique_name: "Server Software Component: Web Shell"}]
    alert: {title: "MITRE T1505.003: New web file (possible web shell)"}
    enabled: true

  - id: 12037
    level: 11
    description: "T1098 — Account manipulation: group membership change"
    groups: [mitre, persistence, account]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          regex: "^(4728|4732|4756)$"
    mitre: [{tactic_id: "TA0003", technique_id: "T1098", technique_name: "Account Manipulation"}]
    alert: {title: "MITRE T1098: Group membership changed"}
    enabled: true

  - id: 12038
    level: 10
    description: "T1546.001 — Change default file handler"
    groups: [mitre, persistence, file_association]
    match:
      type: "registry.value_modified"
      fields:
        key:
          regex: "(?i)Classes\\\\(.*\\\\shell\\\\open\\\\command|exefile)"
    mitre: [{tactic_id: "TA0003", technique_id: "T1546.001", technique_name: "Event Triggered Execution: Change Default File Association"}]
    alert: {title: "MITRE T1546.001: File association hijacked"}
    enabled: true

  # ── TA0004 Privilege Escalation ───────────────────────────────────────────

  - id: 12050
    level: 12
    description: "T1548.002 — UAC bypass via fodhelper"
    groups: [mitre, privilege_escalation, uac_bypass]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(fodhelper|computerdefaults|sdclt|eventvwr)\\.exe"
    mitre: [{tactic_id: "TA0004", technique_id: "T1548.002", technique_name: "Abuse Elevation Control Mechanism: Bypass User Account Control"}]
    alert: {title: "MITRE T1548.002: UAC bypass via auto-elevated binary"}
    enabled: true

  - id: 12051
    level: 13
    description: "T1134.001 — Token impersonation/theft"
    groups: [mitre, privilege_escalation, token]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(Invoke-TokenManipulation|Set-MpPreference|impersonatelogged)"
    mitre: [{tactic_id: "TA0004", technique_id: "T1134.001", technique_name: "Access Token Manipulation: Token Impersonation/Theft"}]
    alert: {title: "MITRE T1134.001: Token impersonation attempt"}
    enabled: true

  - id: 12052
    level: 11
    description: "T1068 — Exploitation for Privilege Escalation"
    groups: [mitre, privilege_escalation, exploit]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4673
    mitre: [{tactic_id: "TA0004", technique_id: "T1068", technique_name: "Exploitation for Privilege Escalation"}]
    alert: {title: "MITRE T1068: Sensitive privilege use"}
    enabled: true

  - id: 12053
    level: 13
    description: "T1484.001 — Group Policy modification"
    groups: [mitre, privilege_escalation, defense_evasion, gpo]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4739
    mitre: [{tactic_id: "TA0004", technique_id: "T1484.001", technique_name: "Domain Policy Modification: Group Policy Modification"}]
    alert: {title: "MITRE T1484.001: Group policy modified"}
    enabled: true

  # ── TA0005 Defense Evasion ────────────────────────────────────────────────

  - id: 12070
    level: 15
    description: "T1070.001 — Clear Windows Event Logs"
    groups: [mitre, defense_evasion, log_tampering, critical]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          regex: "^(1102|104)$"
    mitre: [{tactic_id: "TA0005", technique_id: "T1070.001", technique_name: "Indicator Removal: Clear Windows Event Logs"}]
    alert: {title: "MITRE T1070.001: Event log cleared"}
    enabled: true

  - id: 12071
    level: 12
    description: "T1027 — Obfuscated Files or Information"
    groups: [mitre, defense_evasion, obfuscation]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(FromBase64String|-EncodedCommand|System\\.Convert|\\[char\\]\\[)"
    mitre: [{tactic_id: "TA0005", technique_id: "T1027", technique_name: "Obfuscated Files or Information"}]
    alert: {title: "MITRE T1027: Obfuscated/encoded command"}
    enabled: true

  - id: 12072
    level: 13
    description: "T1562.001 — Disable security tools (Defender)"
    groups: [mitre, defense_evasion, defender]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(Set-MpPreference.*\\$true|sc.*stop.*WinDefend|DisableAntiSpyware)"
    mitre: [{tactic_id: "TA0005", technique_id: "T1562.001", technique_name: "Impair Defenses: Disable or Modify Tools"}]
    alert: {title: "MITRE T1562.001: Windows Defender disabled"}
    enabled: true

  - id: 12073
    level: 12
    description: "T1218.011 — Rundll32 with suspicious arguments"
    groups: [mitre, defense_evasion, lolbin]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)rundll32\\.exe.*(javascript|http|\\.dll,)"
    mitre: [{tactic_id: "TA0005", technique_id: "T1218.011", technique_name: "System Binary Proxy Execution: Rundll32"}]
    alert: {title: "MITRE T1218.011: Suspicious rundll32 execution"}
    enabled: true

  - id: 12074
    level: 11
    description: "T1140 — Deobfuscate/decode files (certutil decode)"
    groups: [mitre, defense_evasion, lolbin]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)certutil.*-decode"
    mitre: [{tactic_id: "TA0005", technique_id: "T1140", technique_name: "Deobfuscate/Decode Files or Information"}]
    alert: {title: "MITRE T1140: certutil decode (LOLBin abuse)"}
    enabled: true

  - id: 12075
    level: 12
    description: "T1218.010 — Regsvr32 abuse"
    groups: [mitre, defense_evasion, lolbin]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)regsvr32.*(/i:http|/s\\s+/u|scrobj\\.dll)"
    mitre: [{tactic_id: "TA0005", technique_id: "T1218.010", technique_name: "System Binary Proxy Execution: Regsvr32"}]
    alert: {title: "MITRE T1218.010: Regsvr32 SCT/COM abuse"}
    enabled: true

  - id: 12076
    level: 11
    description: "T1036.005 — Masquerading: Match legitimate name in suspicious path"
    groups: [mitre, defense_evasion, masquerading]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(svchost|lsass|winlogon|services|csrss)\\.exe"
        exe:
          regex: "(?i)(\\\\Users\\\\|\\\\Temp\\\\|\\\\AppData\\\\)"
    mitre: [{tactic_id: "TA0005", technique_id: "T1036.005", technique_name: "Masquerading: Match Legitimate Name or Location"}]
    alert: {title: "MITRE T1036.005: System binary running from user path"}
    enabled: true

  - id: 12077
    level: 12
    description: "T1564.001 — Hidden Files and Directories"
    groups: [mitre, defense_evasion]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)attrib\\s+\\+h\\s|+s\\s"
    mitre: [{tactic_id: "TA0005", technique_id: "T1564.001", technique_name: "Hide Artifacts: Hidden Files and Directories"}]
    alert: {title: "MITRE T1564.001: File hidden via attrib"}
    enabled: true

  - id: 12078
    level: 13
    description: "T1070.004 — File deletion of system artifacts"
    groups: [mitre, defense_evasion, file_deletion]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(del|erase|rm)\\s+.*\\\\Windows\\\\(System32|SysWOW64)\\\\(Logs|Logfiles)"
    mitre: [{tactic_id: "TA0005", technique_id: "T1070.004", technique_name: "Indicator Removal: File Deletion"}]
    alert: {title: "MITRE T1070.004: System log file deletion"}
    enabled: true

  # ── TA0006 Credential Access ──────────────────────────────────────────────

  - id: 12090
    level: 15
    description: "T1003.001 — LSASS Memory dumping"
    groups: [mitre, credential_access, lsass, critical]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(procdump.*lsass|comsvcs\\.dll.*MiniDump|out-minidump|rundll32.*lsass)"
    mitre: [{tactic_id: "TA0006", technique_id: "T1003.001", technique_name: "OS Credential Dumping: LSASS Memory"}]
    alert: {title: "MITRE T1003.001: LSASS memory dump attempt"}
    enabled: true

  - id: 12091
    level: 14
    description: "T1003.002 — SAM database extraction"
    groups: [mitre, credential_access]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)reg\\s+save.*HKLM\\\\(SAM|SYSTEM|SECURITY)"
    mitre: [{tactic_id: "TA0006", technique_id: "T1003.002", technique_name: "OS Credential Dumping: Security Account Manager"}]
    alert: {title: "MITRE T1003.002: SAM hive extraction"}
    enabled: true

  - id: 12092
    level: 14
    description: "T1003.003 — NTDS.dit extraction"
    groups: [mitre, credential_access, domain]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(ntdsutil|vssadmin.*shadow|esentutl.*ntds\\.dit)"
    mitre: [{tactic_id: "TA0006", technique_id: "T1003.003", technique_name: "OS Credential Dumping: NTDS"}]
    alert: {title: "MITRE T1003.003: NTDS.dit extraction attempt"}
    enabled: true

  - id: 12093
    level: 11
    description: "T1552.001 — Credentials in files (config scanning)"
    groups: [mitre, credential_access]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(findstr|select-string|grep).*(password|passwd|secret|api_?key)"
    mitre: [{tactic_id: "TA0006", technique_id: "T1552.001", technique_name: "Unsecured Credentials: Credentials In Files"}]
    alert: {title: "MITRE T1552.001: Credential file scanning"}
    enabled: true

  - id: 12094
    level: 12
    description: "T1555.003 — Credentials from browsers"
    groups: [mitre, credential_access, browser]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(LaZagne|HackBrowserData|webbrowserpassview)"
    mitre: [{tactic_id: "TA0006", technique_id: "T1555.003", technique_name: "Credentials from Password Stores: Credentials from Web Browsers"}]
    alert: {title: "MITRE T1555.003: Browser credential stealer detected"}
    enabled: true

  - id: 12095
    level: 12
    description: "T1558.003 — Kerberoasting"
    groups: [mitre, credential_access, kerberos]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4769
        win_TicketEncryptionType:
          value: "0x17"
    mitre: [{tactic_id: "TA0006", technique_id: "T1558.003", technique_name: "Steal or Forge Kerberos Tickets: Kerberoasting"}]
    alert: {title: "MITRE T1558.003: Possible Kerberoasting (RC4 ticket)"}
    enabled: true

  - id: 12096
    level: 12
    description: "T1110.003 — Password Spraying"
    groups: [mitre, credential_access, brute_force]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4625
    threshold:
      count: 20
      window: 600
      group_by: win_IpAddress
    mitre: [{tactic_id: "TA0006", technique_id: "T1110.003", technique_name: "Brute Force: Password Spraying"}]
    alert: {title: "MITRE T1110.003: Password spraying from single source"}
    enabled: true

  - id: 12097
    level: 13
    description: "T1556 — Modify authentication process (e.g. password filter DLL)"
    groups: [mitre, credential_access]
    match:
      type: "registry.value_added"
      fields:
        key:
          regex: "(?i)Lsa\\\\Notification Packages"
    mitre: [{tactic_id: "TA0006", technique_id: "T1556.002", technique_name: "Modify Authentication Process: Password Filter DLL"}]
    alert: {title: "MITRE T1556.002: Password filter DLL registered"}
    enabled: true

  # ── TA0007 Discovery ──────────────────────────────────────────────────────

  - id: 12110
    level: 7
    description: "T1083 — File and Directory Discovery"
    groups: [mitre, discovery]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(dir\\s+/s|tree\\s+/f|Get-ChildItem.*-Recurse|find\\s+/)"
    mitre: [{tactic_id: "TA0007", technique_id: "T1083", technique_name: "File and Directory Discovery"}]
    alert: {title: "MITRE T1083: File/directory discovery"}
    enabled: true


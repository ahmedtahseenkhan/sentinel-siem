# WatchTower — MITRE ATT&CK Credential Access (TA0006)
# Rule IDs: 18900-18929
#
# Techniques: T1003 OS Credential Dumping (subs), T1110 Brute Force,
# T1111 MFA Interception, T1187 Forced Authentication, T1212 Exploitation
# for Cred Access, T1539 Steal Web Session Cookie, T1552 Unsecured
# Credentials (subs), T1555 Credentials from Password Stores (subs),
# T1556 Modify Authentication Process, T1558 Steal/Forge Kerberos,
# T1621 MFA Request Generation, T1649 Steal/Forge Authentication Certs

rules:
  - id: 18900
    level: 14
    description: "T1003.001 — LSASS process access (Sysmon EID 10) by non-system caller"
    groups: [mitre, t1003_001, lsass_access, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 10}
        TargetImage: {regex: "(?i)\\\\lsass\\.exe$"}
        GrantedAccess: {regex: "(?i)0x(1010|143A|1438|1FFFFF)"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1003.001"}
    alert: {title: "T1003.001: LSASS access"}
    enabled: true

  - id: 18901
    level: 14
    description: "T1003.001 — LSASS minidump file written"
    groups: [mitre, t1003_001, lsass_dump, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 11}
        TargetFilename: {regex: "(?i)\\\\lsass.*\\.(dmp|mdmp|bin)$"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1003.001"}
    alert: {title: "T1003.001: LSASS dmp file written"}
    enabled: true

  - id: 18902
    level: 14
    description: "T1003.002 — SAM hive saved (reg save HKLM\\SAM ...)"
    groups: [mitre, t1003_002, sam_hive, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        CommandLine: {regex: "(?i)reg\\s+save\\s+HK(LM|EY_LOCAL_MACHINE)\\\\SAM"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1003.002"}
    alert: {title: "T1003.002: reg save SAM hive"}
    enabled: true

  - id: 18903
    level: 14
    description: "T1003.003 — NTDS.dit accessed (Sysmon EID 11 + path)"
    groups: [mitre, t1003_003, ntds, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4663}
        ObjectName: {regex: "(?i)\\\\ntds\\\\ntds\\.dit"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1003.003"}
    alert: {title: "T1003.003: NTDS.dit accessed"}
    enabled: true

  - id: 18904
    level: 13
    description: "T1003.004 — LSA secrets dumped (reg query Policy\\Secrets)"
    groups: [mitre, t1003_004, lsa_secrets]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        CommandLine: {regex: "(?i)reg\\s+(save|query).*HK(LM|EY_LOCAL_MACHINE)\\\\SECURITY"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1003.004"}]
    alert: {title: "T1003.004: LSA SECURITY hive access"}
    enabled: true

  - id: 18905
    level: 13
    description: "T1003.005 — cached domain credentials dumped (cmdkey /list / SamSrv access)"
    groups: [mitre, t1003_005, cached_creds]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\cmdkey\\.exe$"}
        CommandLine: {regex: "(?i)/list"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1003.005"}]
    alert: {title: "T1003.005: cmdkey /list"}
    enabled: true

  - id: 18906
    level: 14
    description: "T1003.006 — DCSync: DS-Replication-Get-Changes-All accessed"
    groups: [mitre, t1003_006, dcsync, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4662}
        Properties: {regex: "(?i)1131f6aa-9c07-11d1-f79f-00c04fc2dcd2|1131f6ad-9c07-11d1-f79f-00c04fc2dcd2"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1003.006"}
    alert: {title: "T1003.006: DCSync replication GUID"}
    enabled: true

  - id: 18907
    level: 13
    description: "T1003.007 — /proc/<pid>/maps read for credential extraction (Linux)"
    groups: [mitre, t1003_007, proc_dump, linux]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)type=PATH.*name=\"/proc/[0-9]+/(maps|mem)\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1003.007"}]
    alert: {title: "T1003.007: /proc/<pid>/maps read"}
    enabled: true

  - id: 18908
    level: 13
    description: "T1003.008 — /etc/shadow / /etc/master.passwd accessed"
    groups: [mitre, t1003_008, shadow]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)type=PATH.*name=\"/etc/(shadow|master\\.passwd)\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1003.008"}]
    alert: {title: "T1003.008: /etc/shadow access"}
    enabled: true

  - id: 18909
    level: 13
    description: "T1110.001 — single-account password guessing (4625 + same TargetUserName)"
    groups: [mitre, t1110_001, password_guessing]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4625}
    correlation:
      window: "5m"
      threshold: 5
      group_by: ["TargetUserName"]
    mitre: [{tactic_id: "TA0006", technique_id: "T1110.001"}]
    alert: {title: "T1110.001: Account password guessing"}
    enabled: true

  - id: 18910
    level: 13
    description: "T1110.002 — password cracking tool executed (hashcat / john)"
    groups: [mitre, t1110_002, password_cracking]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 1}
        Image: {regex: "(?i)\\\\(hashcat|john)\\.exe$"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1110.002"}]
    alert: {title: "T1110.002: Password cracker executed"}
    enabled: true

  - id: 18911
    level: 13
    description: "T1110.003 — password spraying (4625 across many users from one source)"
    groups: [mitre, t1110_003, password_spray]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4625}
    correlation:
      window: "15m"
      threshold: 15
      distinct: ["TargetUserName"]
    mitre: [{tactic_id: "TA0006", technique_id: "T1110.003"}]
    alert: {title: "T1110.003: Password spray"}
    enabled: true

  - id: 18912
    level: 13
    description: "T1110.004 — credential stuffing (4624 success following many 4625 across users)"
    groups: [mitre, t1110_004, credential_stuffing]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4624}
    correlation:
      window: "10m"
      threshold: 1
      precondition_match:
        regex: "win_event_id.*4625"
        precondition_count: 20
    mitre: [{tactic_id: "TA0006", technique_id: "T1110.004"}]
    alert: {title: "T1110.004: Credential stuffing pattern"}
    enabled: true

  - id: 18913
    level: 13
    description: "T1111 — MFA push approval bombardment (T1621-like detection on Azure / Duo / Okta)"
    groups: [mitre, t1111, mfa_intercept]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)(mfa.*denied|push.*declined|second_factor.*failed)"}
    correlation:
      window: "10m"
      threshold: 10
      group_by: ["agent_name"]
    mitre: [{tactic_id: "TA0006", technique_id: "T1111"}]
    alert: {title: "T1111: MFA challenge bombardment"}
    enabled: true

  - id: 18914
    level: 13
    description: "T1187 — forced authentication via UNC path (PetitPotam / authentication relay)"
    groups: [mitre, t1187, ntlm_relay, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4104}
        message: {regex: "(?i)(\\\\\\\\(\\d+\\.\\d+\\.\\d+\\.\\d+|[a-z0-9\\-]+)\\\\[A-Z]\\$|EFSRPC|MS-EFSR)"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1187"}
    alert: {title: "T1187: Forced authentication / NTLM relay"}
    enabled: true

  - id: 18915
    level: 13
    description: "T1539 — browser cookie database (Cookies.sqlite / Cookies file) read"
    groups: [mitre, t1539, cookie_theft]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4663}
        ObjectName: {regex: "(?i)\\\\(Cookies|Cookies\\.sqlite|cookies\\.json|Login Data)$"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1539"}]
    alert: {title: "T1539: Browser cookie DB accessed"}
    enabled: true

  - id: 18916
    level: 13
    description: "T1552.001 — credential string in file written to disk (password=, secret=)"
    groups: [mitre, t1552_001, plain_creds]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4104}
        message: {regex: "(?i)(\\bpassword\\s*=\\s*['\"][^'\"]{8,}|\\bapi_?key\\s*=\\s*['\"][A-Za-z0-9_\\-]{16,})"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1552.001"}]
    alert: {title: "T1552.001: cleartext credential string"}
    enabled: true

  - id: 18917
    level: 13
    description: "T1552.002 — Group Policy Preferences cpassword string detected"
    groups: [mitre, t1552_002, gpp_cpassword]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)cpassword=[\"']?[A-Za-z0-9+/=]{16,}"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1552.002"}]
    alert: {title: "T1552.002: GPP cpassword found"}
    enabled: true

  - id: 18918
    level: 13
    description: "T1552.004 — private key file read (id_rsa / id_ed25519)"
    groups: [mitre, t1552_004, ssh_key_read]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)type=PATH.*name=.*/\\.ssh/(id_rsa|id_ed25519|id_ecdsa|id_dsa)$"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1552.004"}]
    alert: {title: "T1552.004: SSH private-key read"}
    enabled: true

  - id: 18919
    level: 13
    description: "T1552.005 — IMDS contacted directly (169.254.169.254 — metadata creds)"
    groups: [mitre, t1552_005, imds]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 3}
        DestinationIp: {equals: "169.254.169.254"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1552.005"}]
    alert: {title: "T1552.005: IMDS metadata contacted"}
    enabled: true

  - id: 18920
    level: 13
    description: "T1552.007 — Kubernetes service-account token file read"
    groups: [mitre, t1552_007, k8s_sa_token]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)type=PATH.*name=\"/var/run/secrets/kubernetes\\.io/serviceaccount/token\""}
    mitre: [{tactic_id: "TA0006", technique_id: "T1552.007"}]
    alert: {title: "T1552.007: K8s SA token file read"}
    enabled: true

  - id: 18921
    level: 13
    description: "T1555.003 — browser password manager file read (Login Data / logins.json)"
    groups: [mitre, t1555_003, browser_pw_db]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4663}
        ObjectName: {regex: "(?i)\\\\(Login Data|logins\\.json|Passman|key3\\.db|key4\\.db|signons\\.sqlite)$"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1555.003"}]
    alert: {title: "T1555.003: Browser password DB read"}
    enabled: true

  - id: 18922
    level: 13
    description: "T1555.004 — Windows Credential Manager (vaultcli / Get-StoredCredential) accessed"
    groups: [mitre, t1555_004, vault]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4104}
        message: {regex: "(?i)(VaultCli\\.dll|VaultEnumerateVaults|Get-StoredCredential|cmdkey\\.exe.*\\/list)"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1555.004"}]
    alert: {title: "T1555.004: Windows Credential Vault access"}
    enabled: true

  - id: 18923
    level: 13
    description: "T1555.005 — password manager DB read (LastPass / 1Password / KeePass)"
    groups: [mitre, t1555_005, pw_manager]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4663}
        ObjectName: {regex: "(?i)\\\\(KeePass\\.kdbx|1Password\\.sqlite|LastPass|Bitwarden|nordpass)\\b"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1555.005"}]
    alert: {title: "T1555.005: PW manager DB accessed"}
    enabled: true

  - id: 18924
    level: 13
    description: "T1556.003 — pluggable authentication module modified (PAM tamper)"
    groups: [mitre, t1556_003, pam]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)type=PATH.*name=\"/(etc/pam\\.d/|lib/security/pam_)"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1556.003"}]
    alert: {title: "T1556.003: PAM module/config modified"}
    enabled: true

  - id: 18925
    level: 14
    description: "T1558.001 — Kerberos Golden Ticket pattern (anomalous Kerberos service ticket)"
    groups: [mitre, t1558_001, golden_ticket, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4769}
        LogonGuid: {equals: "{00000000-0000-0000-0000-000000000000}"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1558.001"}
    alert: {title: "T1558.001: Golden Ticket suspect (null LogonGuid)"}
    enabled: true

  - id: 18926
    level: 13
    description: "T1558.003 — Kerberoasting: service tickets with RC4-HMAC requested"
    groups: [mitre, t1558_003, kerberoasting]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4769}
        TicketEncryptionType: {contains: "0x17"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1558.003"}]
    alert: {title: "T1558.003: Kerberoasting (RC4 TGS)"}
    enabled: true

  - id: 18927
    level: 13
    description: "T1558.004 — AS-REP Roasting: pre-auth not required (4768)"
    groups: [mitre, t1558_004, asrep_roasting]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {equals: 4768}
        PreAuthType: {equals: "0"}
    mitre: [{tactic_id: "TA0006", technique_id: "T1558.004"}]
    alert: {title: "T1558.004: AS-REP Roasting"}
    enabled: true

  - id: 18928
    level: 14
    description: "T1621 — MFA request generation (push spam)"
    groups: [mitre, t1621, mfa_fatigue, attack]
    match:
      type: "log.file"
      fields:
        message: {regex: "(?i)(mfa.*push.*sent|second_factor.*challenge_sent)"}
    correlation:
      window: "10m"
      threshold: 8
      group_by: ["agent_name"]
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1621"}
    alert: {title: "T1621: MFA push spam"}
    enabled: true

  - id: 18929
    level: 14
    description: "T1649 — certificate-based authentication forged or stolen (ESC1-ESC8 ADCS patterns)"
    groups: [mitre, t1649, adcs_abuse, attack]
    match:
      type: "log.eventlog"
      fields:
        win_event_id: {regex: "^(4886|4887|4888)$"}
        message: {regex: "(?i)(EDITF_ATTRIBUTESUBJECTALTNAME2|Client Authentication.*SAN|Certificate.*template.*supply)"}
    mitre:
      - {tactic_id: "TA0006", technique_id: "T1649"}
    alert: {title: "T1649: ADCS ESC pattern"}
    enabled: true

- id: 19569
  level: 12
  description: "Ransomware: domain admin added by non-IT account"
  groups: [ecrime, ransomware, persistence]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 4728}
      group_name: {regex: "(?i)domain admins|enterprise admins"}
      subject_user: {regex: "(?i)(?!.*(it_|admin_)).+"}

# WatchTower - Ransomware & Data Exfiltration Detection Rules
# Rule IDs: 15000-15099
# Detects ransomware encryption activity, ransom notes, mass file modification,
# data staging, and exfiltration over various protocols.

rules:
  # ── Ransomware: Encryption Activity ───────────────────────────────────────

  - id: 15001
    level: 15
    description: "Ransomware file extension detected"
    groups: [ransomware, encryption, critical]
    match:
      type: "fim.modified"
      fields:
        path:
          regex: "(?i)\\.(crypted|locked|encrypted|crypt|enc|wcry|wncry|ryk|locky|cerber|bip|dharma|wallet|crysis|sage|sodinokibi|revil|conti|maze|ragnar|netwalker|lockbit|babuk|avaddon|zeppelin|phobos)$"
    mitre: [{tactic_id: "TA0040", technique_id: "T1486", technique_name: "Data Encrypted for Impact"}]
    alert: {title: "RANSOMWARE: Known ransomware extension"}
    enabled: true

  - id: 15002
    level: 14
    description: "Mass file rename (>50 files in 60s)"
    groups: [ransomware, mass_modification]
    match:
      type: "fim.modified"
      fields: {}
    threshold:
      count: 50
      window: 60
      group_by: agent_id
    mitre: [{tactic_id: "TA0040", technique_id: "T1486"}]
    alert: {title: "RANSOMWARE: Mass file modification detected"}
    enabled: true

  - id: 15003
    level: 14
    description: "Ransom note dropped on system"
    groups: [ransomware, ransom_note]
    match:
      type: "fim.added"
      fields:
        path:
          regex: "(?i)(README|HOW.?TO.?DECRYPT|RESTORE.?FILES|DECRYPT.?INSTRUCTIONS|YOUR.?FILES|RANSOM|HELP.?DECRYPT|recovery)\\.(txt|html|hta)$"
    mitre: [{tactic_id: "TA0040", technique_id: "T1486"}]
    alert: {title: "RANSOMWARE: Ransom note dropped"}
    enabled: true

  - id: 15004
    level: 13
    description: "Volume Shadow Copy deletion (ransomware preparation)"
    groups: [ransomware, recovery_inhibition]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(vssadmin.*delete\\s+shadows|wmic\\s+shadowcopy\\s+delete|Get-WmiObject\\s+Win32_ShadowCopy.*Delete)"
    mitre: [{tactic_id: "TA0040", technique_id: "T1490", technique_name: "Inhibit System Recovery"}]
    alert: {title: "RANSOMWARE: Shadow copies deleted"}
    enabled: true

  - id: 15005
    level: 13
    description: "Windows backup catalog deletion"
    groups: [ransomware, recovery_inhibition]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)wbadmin\\s+delete\\s+catalog"
    mitre: [{tactic_id: "TA0040", technique_id: "T1490"}]
    alert: {title: "RANSOMWARE: Backup catalog deleted"}
    enabled: true

  - id: 15006
    level: 13
    description: "Boot recovery options disabled"
    groups: [ransomware, recovery_inhibition]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)bcdedit.*(recoveryenabled\\s+no|bootstatuspolicy\\s+ignoreallfailures)"
    mitre: [{tactic_id: "TA0040", technique_id: "T1490"}]
    alert: {title: "RANSOMWARE: Boot recovery disabled"}
    enabled: true

  - id: 15007
    level: 12
    description: "Mass deletion of files in user directories"
    groups: [ransomware, destruction]
    match:
      type: "fim.deleted"
      fields:
        path:
          regex: "(?i)(\\\\Users\\\\|\\\\Documents\\\\|/home/.*/Documents/)"
    threshold:
      count: 100
      window: 120
      group_by: agent_id
    mitre: [{tactic_id: "TA0040", technique_id: "T1485", technique_name: "Data Destruction"}]
    alert: {title: "RANSOMWARE: Mass file deletion in user directories"}
    enabled: true

  - id: 15008
    level: 13
    description: "Known ransomware binary names"
    groups: [ransomware, malware]
    match:
      type: "process.new"
      fields:
        name:
          regex: "(?i)^(wannacry|wncry|tasksche|petya|locky|cerber|teslacrypt|sodinokibi|revil|conti|ryuk|netwalker|maze|lockbit|babuk|avaddon|stop|djvu|phobos|dharma)\\.exe$"
    mitre: [{tactic_id: "TA0040", technique_id: "T1486"}]
    alert: {title: "RANSOMWARE: Known ransomware family detected"}
    enabled: true

  # ── Data Staging ──────────────────────────────────────────────────────────

  - id: 15020
    level: 11
    description: "Large archive creation in temp/staging directory"
    groups: [exfiltration, staging]
    match:
      type: "fim.added"
      fields:
        path:
          regex: "(?i)(/tmp/|\\\\Temp\\\\|\\\\AppData\\\\Local\\\\Temp\\\\).*\\.(zip|rar|7z|tar|tar\\.gz|tar\\.bz2)$"
    mitre: [{tactic_id: "TA0009", technique_id: "T1074.001", technique_name: "Data Staged: Local Data Staging"}]
    alert: {title: "Exfil: Archive created in temp directory"}
    enabled: true

  - id: 15021
    level: 11
    description: "Encrypted archive created (password-protected)"
    groups: [exfiltration, staging]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(7z|rar|zip)\\s+a.*(-p\\w|--password\\s+\\w|/p\\w)"
    mitre: [{tactic_id: "TA0009", technique_id: "T1560.001", technique_name: "Archive Collected Data: Archive via Utility"}]
    alert: {title: "Exfil: Password-protected archive created"}
    enabled: true

  # ── Exfiltration over network ────────────────────────────────────────────

  - id: 15040
    level: 12
    description: "Large outbound transfer to external IP"
    groups: [exfiltration, network]
    match:
      type: "network.connection"
      fields:
        status:
          value: "ESTABLISHED"
        raddr:
          regex: "^(?!(10\\.|172\\.(1[6-9]|2\\d|3[01])\\.|192\\.168\\.|127\\.|169\\.254\\.)).*"
    threshold:
      count: 100
      window: 60
      group_by: agent_id
    mitre: [{tactic_id: "TA0010", technique_id: "T1041", technique_name: "Exfiltration Over C2 Channel"}]
    alert: {title: "Exfil: High volume outbound traffic to external IP"}
    enabled: true

  - id: 15041
    level: 12
    description: "Connection to file sharing service"
    groups: [exfiltration, cloud_storage]
    match:
      type: "network.connection"
      fields:
        raddr:
          regex: "(?i)(dropbox|drive\\.google|onedrive|sharepoint|box\\.com|mega\\.nz|mediafire|wetransfer|sendspace|pastebin|filebin|ufile|anonfile|gofile)"
    mitre: [{tactic_id: "TA0010", technique_id: "T1567.002", technique_name: "Exfiltration Over Web Service: Exfiltration to Cloud Storage"}]
    alert: {title: "Exfil: Connection to cloud file sharing service"}
    enabled: true

  - id: 15042
    level: 11
    description: "DNS exfiltration pattern — long subdomain"
    groups: [exfiltration, dns]
    match:
      type: "network.connection"
      fields:
        rport:
          value: 53
    threshold:
      count: 100
      window: 60
      group_by: agent_id
    mitre: [{tactic_id: "TA0010", technique_id: "T1048.003", technique_name: "Exfiltration Over Alternative Protocol: Exfiltration Over Unencrypted Non-C2 Protocol"}]
    alert: {title: "Exfil: High volume DNS queries (possible DNS tunneling)"}
    enabled: true

  - id: 15043
    level: 12
    description: "Outbound FTP / SCP / SFTP transfer"
    groups: [exfiltration, ftp]
    match:
      type: "network.connection"
      fields:
        status:
          value: "ESTABLISHED"
        rport:
          regex: "^(20|21|22|115|990)$"
    mitre: [{tactic_id: "TA0010", technique_id: "T1048", technique_name: "Exfiltration Over Alternative Protocol"}]
    alert: {title: "Exfil: Outbound FTP/SFTP transfer"}
    enabled: true

  - id: 15044
    level: 13
    description: "TOR connection from endpoint"
    groups: [exfiltration, tor, anonymization]
    match:
      type: "network.connection"
      fields:
        rport:
          regex: "^(9001|9030|9050|9051|9150)$"
    mitre: [{tactic_id: "TA0011", technique_id: "T1090.003", technique_name: "Proxy: Multi-hop Proxy"}]
    alert: {title: "Exfil: TOR network connection"}
    enabled: true

  - id: 15045
    level: 12
    description: "Connection to dark web / .onion"
    groups: [exfiltration, tor, anonymization]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)\\.onion"
    mitre: [{tactic_id: "TA0011", technique_id: "T1090.003"}]
    alert: {title: "Exfil: .onion address referenced"}
    enabled: true

  - id: 15046
    level: 11
    description: "Encoded data POST to external URL"
    groups: [exfiltration, network]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(curl|Invoke-WebRequest|wget|http\\.client).*--data-binary|-d\\s+@.*\\b(POST|--method\\s+POST)"
    mitre: [{tactic_id: "TA0010", technique_id: "T1041"}]
    alert: {title: "Exfil: Outbound POST with binary data"}
    enabled: true

  # ── Data Collection ───────────────────────────────────────────────────────

  - id: 15060
    level: 10
    description: "User documents accessed for collection"
    groups: [exfiltration, collection]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)(robocopy|xcopy|copy|cp\\s+-r|rsync).*\\b(Documents|Desktop|Downloads|Pictures)"
    mitre: [{tactic_id: "TA0009", technique_id: "T1005", technique_name: "Data from Local System"}]
    alert: {title: "Exfil: Bulk copy of user documents"}
    enabled: true

  - id: 15061
    level: 11
    description: "Removable media write activity (USB exfil)"
    groups: [exfiltration, removable_media]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 6416
    mitre: [{tactic_id: "TA0010", technique_id: "T1052.001", technique_name: "Exfiltration Over Physical Medium: Exfiltration over USB"}]
    alert: {title: "Exfil: Removable device connected"}
    enabled: true

  - id: 15062
    level: 11
    description: "Sensitive registry hive export"
    groups: [exfiltration, credential_access]
    match:
      type: "process.new"
      fields:
        cmdline:
          regex: "(?i)reg\\s+(save|export)\\s+(HKLM|HKEY_LOCAL_MACHINE)\\\\(SAM|SYSTEM|SECURITY)"
    mitre: [{tactic_id: "TA0006", technique_id: "T1003.002", technique_name: "OS Credential Dumping: Security Account Manager"}]
    alert: {title: "Exfil: Registry hive exported"}
    enabled: true

  # ── Encryption Key / Wallet Activity ──────────────────────────────────────

  - id: 15080
    level: 11
    description: "Cryptocurrency wallet file accessed"
    groups: [exfiltration, crypto_wallet]
    match:
      type: "fim.modified"
      fields:
        path:
          regex: "(?i)(wallet\\.dat|electrum/wallets|bitcoin/wallet|ethereum/keystore|metamask)"
    mitre: [{tactic_id: "TA0009", technique_id: "T1005"}]
    alert: {title: "Exfil: Cryptocurrency wallet file activity"}
    enabled: true

  - id: 15081
    level: 12
    description: "SSH private key file accessed/exfiltrated"
    groups: [exfiltration, ssh_key]
    match:
      type: "fim.modified"
      fields:
        path:
          regex: "(?i)\\.ssh/(id_rsa|id_dsa|id_ecdsa|id_ed25519)($|\\b)"
    mitre: [{tactic_id: "TA0006", technique_id: "T1552.004", technique_name: "Unsecured Credentials: Private Keys"}]
    alert: {title: "Exfil: SSH private key file modified/accessed"}
    enabled: true

# DPRK (Lazarus, APT38, Kimsuky, Andariel, BlueNoroff) TTPs
# IDs 19470-19499 (30 rules)

- id: 19470
  level: 12
  description: "Lazarus: AppleJeus fake crypto-trading app installer"
  groups: [apt, lazarus, dprk, crypto]
  match:
    type: "log.file"
    fields:
      source: {equals: "fim"}
      path: {regex: "(?i)\\\\(celasTrader|jmttrading|kupayswap|unionCryptoTrader)"}
  alert: {title: "Lazarus: AppleJeus installer"}
  enabled: true

- id: 19471
  level: 12
  description: "Lazarus: BADCALL / FALLCHILL backdoor TLS fingerprint pattern"
  groups: [apt, lazarus, c2]
  match:
    type: "log.file"
    fields:
      tls_ja3: {regex: "^(72a589da586844d7f0818ce684948eea|6734f37431670b3ab4292b8f60f29984)$"}
  alert: {title: "Lazarus: BADCALL/FALLCHILL JA3"}
  enabled: true


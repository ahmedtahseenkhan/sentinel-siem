- id: 19469
  level: 12
  description: "Volt Typhoon: deletion of Windows event logs to cover tracks"
  groups: [apt, volt_typhoon, defense_evasion]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 1102}
  alert: {title: "Volt Typhoon: event log cleared"}
  enabled: true

- id: 19467
  level: 11
  description: "Volt Typhoon: vssadmin used to copy SYSTEM/SAM hives"
  groups: [apt, volt_typhoon, credential_access]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 1}

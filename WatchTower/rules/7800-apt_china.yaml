  mitre:
    - {tactic_id: "TA0003", technique_id: "T1505.003", technique_name: "Web Shell"}
  alert: {title: "APT41: ASPX webshell drop"}
  enabled: true

- id: 19461
  level: 12
  description: "Mustang Panda: PlugX persistence via DLL hijack of Adobe Acrobat"
  groups: [apt, mustang_panda, persistence]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 7}
      image: {regex: "(?i)\\\\acrord32\\.exe"}
      image_loaded: {regex: "(?i)\\\\(adobeplugin|acrobatres|acrord32)\\.dll"}
      loaded_signed: {equals: "false"}
  alert: {title: "Mustang Panda: Acrobat DLL hijack"}
  enabled: true

- id: 19462
  level: 11
  description: "APT41: BPFDoor Linux backdoor BPF filter signature"
  groups: [apt, apt41, linux, c2]
  match:
    type: "logs.syslog"
    fields:
      source: {regex: "(?i)(audit|sysdig)"}
      syscall: {equals: "setsockopt"}
      arg: {regex: "(?i)SO_ATTACH_FILTER"}
      process: {regex: "(?i)(/dev/shm|/tmp)/[a-z0-9]{6,}"}
  alert: {title: "APT41: BPFDoor BPF filter set"}
  enabled: true

- id: 19463
  level: 11
  description: "Volt Typhoon: Mailbox export to PST followed by archive delete"
  groups: [apt, volt_typhoon, exfil]
  match:
    type: "log.file"
    fields:
      source: {equals: "o365"}
      operation: {regex: "(?i)(New-MailboxExportRequest|Remove-MailboxExportRequest)"}
  correlation: {window: "1h", threshold: 2, group_by: ["user"]}
  alert: {title: "Volt Typhoon: mailbox export + cleanup"}
  enabled: true

- id: 19464
  level: 11
  description: "APT41: Outlook Home Page WebView abuse for persistence"
  groups: [apt, apt41, persistence]
  match:
    type: "log.eventlog"
    fields:
      event_id: {equals: 13}
      target_object: {regex: "(?i)\\\\Office\\\\.*\\\\Outlook\\\\WebView\\\\.*\\\\URL"}
  mitre:
    - {tactic_id: "TA0003", technique_id: "T1137.004", technique_name: "Outlook Home Page"}
  alert: {title: "APT41: Outlook home page persistence"}
  enabled: true

- id: 19465
  level: 11
  description: "APT41: Spam relay via compromised Exchange (Squirrelwaffle pattern)"

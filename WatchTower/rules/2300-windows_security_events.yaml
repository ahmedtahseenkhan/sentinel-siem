# WatchTower - Comprehensive Windows Security Event Detection Rules
# Rule IDs: 11000-11199
# Covers Windows Security event log event IDs across authentication,
# account management, policy changes, object access, process auditing,
# and system events. Maps to MITRE ATT&CK techniques.

rules:
  # ── Authentication / Logon (4624, 4625, 4648, 4634, 4647) ────────────────

  - id: 11001
    level: 5
    description: "Successful interactive logon detected"
    groups: [authentication, windows, logon]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4624
        win_LogonType:
          value: "2"
    mitre:
      - tactic_id: "TA0001"
        tactic_name: "Initial Access"
        technique_id: "T1078"
        technique_name: "Valid Accounts"
    alert:
      title: "Windows: Interactive logon"
    enabled: true

  - id: 11002
    level: 8
    description: "Successful RDP logon (LogonType 10)"
    groups: [authentication, windows, rdp, remote_access]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4624
        win_LogonType:
          value: "10"
    mitre:
      - tactic_id: "TA0008"
        tactic_name: "Lateral Movement"
        technique_id: "T1021.001"
        technique_name: "Remote Services: Remote Desktop Protocol"
    alert:
      title: "Windows: RDP logon detected"
    enabled: true

  - id: 11003
    level: 7
    description: "Network logon (LogonType 3) — SMB/RPC access"
    groups: [authentication, windows, network_logon]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4624
        win_LogonType:
          value: "3"
    mitre:
      - tactic_id: "TA0008"
        tactic_name: "Lateral Movement"
        technique_id: "T1021.002"
        technique_name: "Remote Services: SMB/Windows Admin Shares"
    alert:
      title: "Windows: Network logon"
    enabled: true

  - id: 11004
    level: 9
    description: "Service account logon (LogonType 5)"
    groups: [authentication, windows, service_account]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4624
        win_LogonType:
          value: "5"
    mitre:
      - tactic_id: "TA0003"
        tactic_name: "Persistence"
        technique_id: "T1078.003"
        technique_name: "Valid Accounts: Local Accounts"
    alert:
      title: "Windows: Service logon"
    enabled: true

  - id: 11005
    level: 8
    description: "Failed logon attempt"
    groups: [authentication, windows, failed_logon]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4625
    mitre:
      - tactic_id: "TA0006"
        tactic_name: "Credential Access"
        technique_id: "T1110.001"
        technique_name: "Brute Force: Password Guessing"
    alert:
      title: "Windows: Failed logon attempt"
    enabled: true

  - id: 11006
    level: 12
    description: "Multiple failed logons — possible brute force"
    groups: [authentication, windows, brute_force, high_severity]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4625
    threshold:
      count: 10
      window: 300
      group_by: win_TargetUserName
    mitre:
      - tactic_id: "TA0006"
        tactic_name: "Credential Access"
        technique_id: "T1110.001"
        technique_name: "Brute Force: Password Guessing"
    alert:
      title: "Windows: Brute force attack detected"
    enabled: true

  - id: 11007
    level: 11
    description: "Logon with explicit credentials (runas / different user)"
    groups: [authentication, windows, credential_use]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4648
    mitre:
      - tactic_id: "TA0008"
        tactic_name: "Lateral Movement"
        technique_id: "T1078"
        technique_name: "Valid Accounts"
    alert:
      title: "Windows: Logon with explicit credentials"
    enabled: true

  - id: 11008
    level: 4
    description: "User logoff event"
    groups: [authentication, windows]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4634
    alert:
      title: "Windows: User logoff"
    enabled: true

  - id: 11009
    level: 4
    description: "User-initiated logoff"
    groups: [authentication, windows]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4647
    alert:
      title: "Windows: User-initiated logoff"
    enabled: true

  - id: 11010
    level: 12
    description: "Special privileges assigned to new logon"
    groups: [authentication, windows, privilege_escalation, high_severity]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4672
    mitre:
      - tactic_id: "TA0004"
        tactic_name: "Privilege Escalation"
        technique_id: "T1078.003"
        technique_name: "Valid Accounts: Local Accounts"
    alert:
      title: "Windows: Privileged logon (Admin/System)"
    enabled: true

  - id: 11011
    level: 7
    description: "Account locked out"
    groups: [authentication, windows]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4740
    alert:
      title: "Windows: Account locked out"
    enabled: true

  - id: 11012
    level: 13
    description: "Kerberos pre-authentication failed — possible AS-REP roasting"
    groups: [authentication, windows, kerberos, credential_access, high_severity]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4771
    mitre:
      - tactic_id: "TA0006"
        tactic_name: "Credential Access"
        technique_id: "T1558.004"
        technique_name: "Steal or Forge Kerberos Tickets: AS-REP Roasting"
    alert:
      title: "Windows: Kerberos pre-auth failure (AS-REP roasting?)"
    enabled: true

  - id: 11013
    level: 10
    description: "Kerberos TGT requested"
    groups: [authentication, windows, kerberos]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4768
    mitre:
      - tactic_id: "TA0006"
        tactic_name: "Credential Access"
        technique_id: "T1558"
        technique_name: "Steal or Forge Kerberos Tickets"
    alert:
      title: "Windows: Kerberos TGT requested"
    enabled: true

  - id: 11014
    level: 11
    description: "Kerberos service ticket requested — possible Kerberoasting"
    groups: [authentication, windows, kerberos, kerberoasting]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4769
        win_TicketEncryptionType:
          regex: "(?i)(0x17|0x18|rc4)"
    mitre:
      - tactic_id: "TA0006"
        tactic_name: "Credential Access"
        technique_id: "T1558.003"
        technique_name: "Steal or Forge Kerberos Tickets: Kerberoasting"
    alert:
      title: "Windows: Kerberos ticket with weak encryption (Kerberoasting indicator)"
    enabled: true

  - id: 11015
    level: 10
    description: "NTLM authentication used"
    groups: [authentication, windows, ntlm]
    match:
      type: "log.eventlog"
      fields:
        win_event_id:
          value: 4776
    mitre:
      - tactic_id: "TA0006"
        tactic_name: "Credential Access"
        technique_id: "T1187"
        technique_name: "Forced Authentication"
    alert:
      title: "Windows: NTLM authentication"
    enabled: true


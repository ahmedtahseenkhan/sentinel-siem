# Email security deep coverage (BEC, phishing, attachment, header)
# IDs 19750-19779 (30 rules)

- id: 19750
  level: 11
  description: "BEC: CEO impersonation - display name matches exec, from-domain external"
  groups: [email, bec]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      from_display_name: {regex: "(?i)(ceo|cfo|coo|president)"}
      from_domain_internal: {equals: "false"}
  alert: {title: "BEC: exec display-name impersonation"}
  enabled: true

- id: 19751
  level: 11
  description: "BEC: invoice/wire change request from external domain"
  groups: [email, bec, fraud]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      subject: {regex: "(?i)(wire|payment|invoice|bank|account).*(change|update|new)"}
      from_domain_internal: {equals: "false"}
  alert: {title: "BEC: wire change request external"}
  enabled: true

- id: 19752
  level: 11
  description: "Phishing: punycode / IDN homoglyph in sender domain"
  groups: [email, phishing]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      from_domain: {regex: "(?i)^xn--"}
  alert: {title: "Phishing: punycode sender"}
  enabled: true

- id: 19753
  level: 11
  description: "Phishing: lookalike domain (1-char swap of corp domain)"
  groups: [email, phishing]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      domain_levenshtein_to_corp: {regex: "^[1-2]$"}
  alert: {title: "Phishing: lookalike sender domain"}
  enabled: true

- id: 19754
  level: 11
  description: "Email: SPF=fail and DMARC=fail and message delivered"
  groups: [email, authentication]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      spf: {equals: "fail"}
      dmarc: {equals: "fail"}
      action: {equals: "delivered"}
  alert: {title: "Email: SPF+DMARC fail delivered"}
  enabled: true

- id: 19755
  level: 10
  description: "Email: DKIM signature missing for internal-domain sender"
  groups: [email, authentication]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      from_domain_internal: {equals: "true"}
      dkim: {equals: "none"}
  alert: {title: "Email: missing DKIM on internal-domain"}
  enabled: true

- id: 19756
  level: 11
  description: "Phishing: attachment with double extension (.pdf.exe etc.)"
  groups: [email, phishing, attachment]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      attachment_filename: {regex: "(?i)\\.(pdf|docx?|xlsx?|jpg|png)\\.(exe|scr|bat|cmd|js|vbs|hta|lnk)$"}
  alert: {title: "Phishing: double-extension attachment"}
  enabled: true

- id: 19757
  level: 11
  description: "Phishing: HTML attachment containing form posting to external domain"
  groups: [email, phishing, html_smuggling]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      attachment_ext: {equals: "html"}
      attachment_content: {regex: "(?i)<form[^>]+action=[\"']https?://(?!.*corp).+"}
  alert: {title: "Phishing: HTML form to external POST"}
  enabled: true

- id: 19758
  level: 11
  description: "Phishing: ISO/IMG/VHD attachment (container bypass)"
  groups: [email, phishing, attachment]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      attachment_ext: {regex: "(?i)\\.(iso|img|vhd|vhdx|cab)$"}
  alert: {title: "Phishing: container-format attachment"}
  enabled: true

- id: 19759
  level: 11
  description: "Phishing: OneNote attachment containing embedded script"
  groups: [email, phishing, attachment]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      attachment_ext: {equals: "one"}
      embedded_script: {equals: "true"}
  alert: {title: "Phishing: malicious OneNote"}
  enabled: true

- id: 19760
  level: 11
  description: "Phishing: Office document with auto-open macro + URL"
  groups: [email, phishing, macro]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      macro_auto_open: {equals: "true"}
      macro_contains_url: {equals: "true"}
  alert: {title: "Phishing: weaponized Office macro"}
  enabled: true

- id: 19761
  level: 12
  description: "BEC: forwarding rule auto-forward externally then deleted by attacker"
  groups: [email, bec, persistence]
  match:
    type: "log.file"
    fields:
      source: {equals: "o365"}
      operation: {regex: "(?i)(New-InboxRule|Set-InboxRule)"}
      detail: {regex: "(?i)ForwardTo.*@(?!corp).+"}
  alert: {title: "BEC: external auto-forward rule"}
  enabled: true

- id: 19762
  level: 11
  description: "Phishing: URL shortener in body of email"
  groups: [email, phishing]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      body_url_domain: {regex: "(?i)(bit\\.ly|tinyurl|t\\.co|ow\\.ly|is\\.gd|goo\\.gl)"}
  alert: {title: "Phishing: URL shortener in body"}
  enabled: true

- id: 19763
  level: 11
  description: "Phishing: QR code in image (quishing)"
  groups: [email, phishing, quishing]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      attachment_has_qr: {equals: "true"}
      sender_external: {equals: "true"}
  alert: {title: "Quishing: QR code from external sender"}
  enabled: true

- id: 19764
  level: 12
  description: "BEC: vendor email account compromise - reply chain hijack"
  groups: [email, bec, vendor]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      reply_thread: {equals: "true"}
      sender_country_changed: {equals: "true"}
  alert: {title: "BEC: thread hijack with geo change"}
  enabled: true

- id: 19765
  level: 11
  description: "Email: outbound mass-mail spike from one user (compromise indicator)"
  groups: [email, anomaly, exfil]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      direction: {equals: "outbound"}
  correlation: {window: "10m", threshold: 100, group_by: ["sender"]}
  alert: {title: "Email: outbound mass spike from user"}
  enabled: true

- id: 19766
  level: 11
  description: "M365: legacy auth protocol used to send mail (IMAP/POP/SMTP basic)"
  groups: [email, authentication, legacy]
  match:
    type: "log.file"
    fields:
      source: {equals: "azure_signin"}
      client_app: {regex: "(?i)(IMAP|POP|SMTP)"}
      auth_protocol: {equals: "basic"}
      operation: {equals: "Send"}
  alert: {title: "M365: legacy basic auth send"}
  enabled: true

- id: 19767
  level: 11
  description: "M365: mailbox audit log disabled for user"
  groups: [email, audit_tamper]
  match:
    type: "log.file"
    fields:
      source: {equals: "o365"}
      operation: {regex: "(?i)Set-Mailbox.*AuditEnabled\\s*\\$false"}
  alert: {title: "M365: mailbox audit disabled"}
  enabled: true

- id: 19768
  level: 11
  description: "M365: Application granted high-risk Graph permission (Mail.ReadWrite.All)"
  groups: [email, cloud, oauth]
  match:
    type: "log.file"
    fields:
      source: {equals: "azure_audit"}
      operation: {regex: "(?i)Update application|Consent to application"}
      permission: {regex: "(?i)(Mail\\.ReadWrite\\.All|Mail\\.Send\\.All|full_access_as_app)"}
  alert: {title: "M365: high-risk Graph permission consent"}
  enabled: true

- id: 19769
  level: 11
  description: "Email: Exchange transport rule disabled for malware filter"
  groups: [email, evasion]
  match:
    type: "log.file"
    fields:
      source: {equals: "o365"}
      operation: {regex: "(?i)Disable-TransportRule|Disable-MalwareFilterPolicy"}
  alert: {title: "Email: malware filter disabled"}
  enabled: true

- id: 19770
  level: 11
  description: "Phishing: SVG attachment with embedded JavaScript"
  groups: [email, phishing, attachment]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      attachment_ext: {equals: "svg"}
      attachment_content: {regex: "(?i)<script|onload="}
  alert: {title: "Phishing: SVG with JS"}
  enabled: true

- id: 19771
  level: 11
  description: "Phishing: spoofed Microsoft / Google login page URL clicked"
  groups: [email, phishing]
  match:
    type: "log.file"
    fields:
      source: {equals: "url_filter"}
      visual_match_brand: {regex: "(?i)(microsoft|office|google)"}
      domain_owner_brand: {equals: "false"}
      action: {equals: "click"}
  alert: {title: "Phishing: brand-impersonation page click"}
  enabled: true

- id: 19772
  level: 12
  description: "BEC: payroll direct-deposit change request from external"
  groups: [email, bec, payroll]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      subject: {regex: "(?i)(direct deposit|payroll|paycheck).*(update|change)"}
      from_domain_internal: {equals: "false"}
  alert: {title: "BEC: payroll change external"}
  enabled: true

- id: 19773
  level: 10
  description: "Email: encrypted ZIP attachment with password in body (sandbox bypass)"
  groups: [email, phishing, attachment]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      attachment_ext: {regex: "(?i)\\.(zip|7z|rar)$"}
      attachment_encrypted: {equals: "true"}
      body: {regex: "(?i)password\\s*[:=]\\s*\\w+"}
  alert: {title: "Phishing: pwd-protected archive w/ pwd in body"}
  enabled: true

- id: 19774
  level: 10
  description: "Email: gateway bypass rule added by admin"
  groups: [email, evasion]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      operation: {regex: "(?i)add.*bypass.*rule"}
  alert: {title: "Email: gateway bypass rule added"}
  enabled: true

- id: 19775
  level: 11
  description: "Phishing: AiTM/Adversary-in-the-Middle - Evilginx / Modlishka indicator"
  groups: [email, phishing, aitm]
  match:
    type: "log.file"
    fields:
      source: {equals: "azure_signin"}
      session_token_anomaly: {equals: "true"}
      ip_proxy: {equals: "true"}
  mitre:
    - {tactic_id: "TA0006", technique_id: "T1557", technique_name: "Adversary-in-the-Middle"}
  alert: {title: "Phishing: AiTM session token anomaly"}
  enabled: true

- id: 19776
  level: 11
  description: "Email: spoofed internal sender from external SMTP server"
  groups: [email, spoofing]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      from_domain_internal: {equals: "true"}
      origin_ip_corp: {equals: "false"}
  alert: {title: "Email: internal-domain spoof from external IP"}
  enabled: true

- id: 19777
  level: 10
  description: "M365: Mailbox forwarding to non-corp address enabled"
  groups: [email, persistence, dlp]
  match:
    type: "log.file"
    fields:
      source: {equals: "o365"}
      operation: {regex: "(?i)Set-Mailbox.*ForwardingSmtpAddress"}
      forward_target_domain: {regex: "(?i)(?!.*corp).+"}
  alert: {title: "M365: external mailbox forwarding"}
  enabled: true

- id: 19778
  level: 11
  description: "Email: VIP user mailbox accessed by delegated admin without ticket"
  groups: [email, insider]
  match:
    type: "log.file"
    fields:
      source: {equals: "o365"}
      operation: {equals: "MailItemsAccessed"}
      target_vip: {equals: "true"}
      ticket_id: {equals: ""}
  alert: {title: "Email: VIP mailbox access w/o ticket"}
  enabled: true

- id: 19779
  level: 11
  description: "Email: unusual large attachment outbound to personal domain"
  groups: [email, dlp]
  match:
    type: "log.file"
    fields:
      source: {equals: "email_gateway"}
      direction: {equals: "outbound"}
      attachment_size_mb: {regex: "^([2-9][0-9]|[1-9][0-9]{2,})$"}
      recipient_domain: {regex: "(?i)(gmail|yahoo|hotmail|outlook\\.com|aol)"}
  alert: {title: "Email: large attachment to personal address"}
  enabled: true

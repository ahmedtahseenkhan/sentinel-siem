agent:
  name: "{{hostname}}"
manager:
  url: "watchtower:50051"
  enroll_token: "sentinel-enroll-secret-2024"
  reconnect:
    max_attempts: 0
    initial_backoff: "2s"
    max_backoff: "60s"
collectors:
  system:
    enabled: true
    interval: "30s"
  process:
    enabled: true
    interval: "30s"
  network:
    enabled: true
    interval: "120s"
  file_integrity:
    enabled: false
  logs:
    enabled: false
  sca:
    enabled: false
  rootcheck:
    enabled: false
  syscollector:
    enabled: true
    interval: "5m"
  ransomware_canary:
    enabled: true
    interval: "10s"
    file_count: 2
    paths:
      - "/tmp"

# Active Response — lets SOAR playbooks run firewall-drop/kill-process here.
# NOTE: inside Docker, iptables needs the NET_ADMIN capability, so the watchnode
# services in docker-compose.local.yaml are given `cap_add: [NET_ADMIN]`. Without
# it the drop command runs but fails (reported as "failed"). On the real Windows
# VM agents this is not needed — netsh runs as SYSTEM.
active_response:
  enabled: true
  allowed_commands: []
  command_timeout_secs: 15
  block_ttl_secs: 3600
  safelist_ips:
    - "192.168.100.0/24"   # management subnet — never block
    - "127.0.0.1"
  safelist_users:
    - "root"

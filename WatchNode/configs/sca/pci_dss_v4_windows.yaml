policy:
  id: "pci_dss_v4_windows"
  name: "PCI DSS v4.0 - Windows Endpoint"
  description: >
    Payment Card Industry Data Security Standard v4.0 checks for Windows endpoints.
    Covers access control, audit logging, encryption, and network security
    requirements applicable to cardholder data environments.
  references:
    - "https://www.pcisecuritystandards.org/document_library"

  checks:
    # ── Requirement 2: Apply Secure Configurations ─────────────────────────

    - id: 20001
      title: "PCI 2.2.1 - Disable unnecessary services"
      description: "Telnet service should be disabled."
      rationale: "Telnet transmits data in cleartext and is not PCI-compliant."
      remediation: "Disable the Telnet service via services.msc or Group Policy."
      compliance: "PCI DSS v4.0 Req 2.2.1"
      type: "command"
      condition: "none"
      rules:
        - "c:sc query tlntsvr -> r:RUNNING"

    - id: 20002
      title: "PCI 2.2.2 - Windows Remote Registry disabled"
      description: "Remote Registry service should not be running."
      rationale: "Remote registry access can expose sensitive configuration data."
      remediation: "Set Remote Registry service to Disabled."
      compliance: "PCI DSS v4.0 Req 2.2.1"
      type: "command"
      condition: "none"
      rules:
        - "c:sc query RemoteRegistry -> r:RUNNING"

    - id: 20003
      title: "PCI 2.3.1 - Encrypt all non-console administrative access"
      description: "RDP should use Network Level Authentication."
      rationale: "NLA ensures encrypted authentication before session establishment."
      remediation: "Enable NLA for Remote Desktop in System Properties."
      compliance: "PCI DSS v4.0 Req 2.3.1"
      type: "command"
      condition: "all"
      rules:
        - "c:reg query HKLM\\SYSTEM\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp /v UserAuthentication -> r:0x1"

    # ── Requirement 7: Restrict Access ────────────────────────────────────

    - id: 20004
      title: "PCI 7.2.1 - Guest account is disabled"
      description: "The built-in Guest account must be disabled."
      rationale: "Guest accounts provide anonymous access to cardholder data systems."
      remediation: "Disable the Guest account via Local Users and Groups."
      compliance: "PCI DSS v4.0 Req 7.2.1"
      type: "command"
      condition: "all"
      rules:
        - "c:net user guest -> r:Account active\\s+No"

    - id: 20005
      title: "PCI 7.3.1 - Rename Administrator account"
      description: "The default Administrator account should be renamed."
      rationale: "Known account names make brute-force attacks easier."
      remediation: "Rename the Administrator account via secpol.msc."
      compliance: "PCI DSS v4.0 Req 7.3.1"
      type: "command"
      condition: "none"
      rules:
        - "c:net user administrator -> r:Account active\\s+Yes"

    # ── Requirement 8: Identify Users and Authenticate Access ─────────────

    - id: 20006
      title: "PCI 8.3.6 - Minimum password length 12+ characters"
      description: "Passwords must be at least 12 characters for PCI DSS v4.0."
      rationale: "Longer passwords resist brute-force and dictionary attacks."
      remediation: "Set minimum password length to 12 in Password Policy."
      compliance: "PCI DSS v4.0 Req 8.3.6"
      type: "command"
      condition: "all"
      rules:
        - "c:net accounts -> r:Minimum password length:\\s+1[2-9]|[2-9][0-9]"

    - id: 20007
      title: "PCI 8.3.4 - Account lockout after 10 attempts"
      description: "Account lockout must trigger after no more than 10 failed attempts."
      rationale: "Lockout limits brute-force attack window."
      remediation: "Set account lockout threshold <= 10 in Account Lockout Policy."
      compliance: "PCI DSS v4.0 Req 8.3.4"
      type: "command"
      condition: "all"
      rules:
        - "c:net accounts -> r:Lockout threshold:\\s+[1-9]$|10$"

    - id: 20008
      title: "PCI 8.6.1 - Password history enforced (last 4 passwords)"
      description: "Users should not be able to reuse the last 4 passwords."
      rationale: "Password history prevents cycling through a small set of passwords."
      remediation: "Set Enforce password history to 4 or more in Password Policy."
      compliance: "PCI DSS v4.0 Req 8.6.1"
      type: "command"
      condition: "all"
      rules:
        - "c:net accounts -> r:Length of password history maintained:\\s+[4-9]|[1-9][0-9]"

    # ── Requirement 10: Log and Monitor All Access ─────────────────────────

    - id: 20009
      title: "PCI 10.2.1 - Audit policy: Logon events enabled"
      description: "Windows audit logon events policy must be enabled."
      rationale: "Audit logs are required to detect and investigate access to cardholder data."
      remediation: "Enable Audit Logon Events (Success and Failure) via auditpol."
      compliance: "PCI DSS v4.0 Req 10.2.1"
      type: "command"
      condition: "all"
      rules:
        - "c:auditpol /get /subcategory:Logon -> r:Success and Failure|Success"

    - id: 20010
      title: "PCI 10.2.1 - Audit policy: Account management enabled"
      description: "Windows account management auditing must be enabled."
      rationale: "Account management events detect unauthorized account creation."
      remediation: "Enable Audit Account Management (Success and Failure) via auditpol."
      compliance: "PCI DSS v4.0 Req 10.2.1"
      type: "command"
      condition: "all"
      rules:
        - "c:auditpol /get /subcategory:\"User Account Management\" -> r:Success and Failure|Success"

    - id: 20011
      title: "PCI 10.3.3 - Windows Event Log not cleared"
      description: "Security event log must not be disabled or set to overwrite."
      rationale: "Log clearing can indicate tampering or cover-up of an intrusion."
      remediation: "Set Security log retention to at least 90 days."
      compliance: "PCI DSS v4.0 Req 10.3.3"
      type: "command"
      condition: "none"
      rules:
        - "c:wevtutil gl Security -> r:enabled: false"

    # ── Requirement 12: Network Security ──────────────────────────────────

    - id: 20012
      title: "PCI 1.3.2 - Windows Firewall enabled for all profiles"
      description: "Windows Firewall must be enabled for Domain, Private, and Public profiles."
      rationale: "Host-based firewall provides a last line of defense against network attacks."
      remediation: "Enable Windows Defender Firewall for all profiles via wf.msc."
      compliance: "PCI DSS v4.0 Req 1.3.2"
      type: "command"
      condition: "all"
      rules:
        - "c:netsh advfirewall show allprofiles -> r:State\\s+ON"

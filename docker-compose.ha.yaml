# Sentinel SIEM — High Availability Overrides
#
# This compose file extends docker-compose.full.yaml with HA-grade data layer:
#   - PostgreSQL primary + hot standby with streaming replication
#   - Kafka 3-node KRaft cluster (replaces single-node kafka)
#
# Usage:
#   docker compose -f docker-compose.full.yaml -f docker-compose.ha.yaml up -d
#
# Prerequisites:
#   - Set POSTGRES_PASSWORD and POSTGRES_REPLICATION_PASSWORD in .env
#   - At least 16GB RAM recommended for the full HA stack

services:
  # ── PostgreSQL Primary ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-watchtower}
      - POSTGRES_USER=${POSTGRES_USER:-watchtower}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-watchtower_dev_pass}
      - POSTGRES_REPLICATION_USER=${POSTGRES_REPLICATION_USER:-replicator}
      - POSTGRES_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD:-replicator_dev_pass}
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./infra/postgres/init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh:ro

  # ── PostgreSQL Hot Standby (read replica) ────────────────────────────────────
  postgres-replica:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-watchtower}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-watchtower_dev_pass}
      - POSTGRES_REPLICATION_USER=${POSTGRES_REPLICATION_USER:-replicator}
      - POSTGRES_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD:-replicator_dev_pass}
      - PRIMARY_HOST=postgres
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
      - ./infra/postgres/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchtower}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Kafka 3-node KRaft cluster ────────────────────────────────────────────────
  # Replaces the single-node `kafka` service from docker-compose.full.yaml.
  # All 3 brokers also act as controllers (combined mode) for simplicity.
  # Topic replication factor should be 3 to survive single-broker loss.
  kafka:
    image: apache/kafka:3.7.0
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=6
      - KAFKA_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_LOG_RETENTION_HOURS=72
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk

  kafka-2:
    image: apache/kafka:3.7.0
    environment:
      - KAFKA_NODE_ID=2
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-2:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=6
      - KAFKA_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_LOG_RETENTION_HOURS=72
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    restart: unless-stopped

  kafka-3:
    image: apache/kafka:3.7.0
    environment:
      - KAFKA_NODE_ID=3
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-3:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=6
      - KAFKA_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_LOG_RETENTION_HOURS=72
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    restart: unless-stopped

  # Update WatchTower and WatchVault to use all 3 brokers
  watchtower:
    environment:
      - WATCHTOWER_KAFKA_BROKERS=kafka:9092,kafka-2:9092,kafka-3:9092

  watchtower-2:
    environment:
      - WATCHTOWER_KAFKA_BROKERS=kafka:9092,kafka-2:9092,kafka-3:9092

  watchvault:
    environment:
      - WATCHVAULT_KAFKA_BROKERS=kafka:9092,kafka-2:9092,kafka-3:9092

volumes:
  postgres-replica-data:
  kafka-2-data:
  kafka-3-data:

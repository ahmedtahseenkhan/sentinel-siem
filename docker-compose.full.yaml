version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=watchtower
      - POSTGRES_USER=watchtower
      - POSTGRES_PASSWORD=watchtower_dev_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchtower -d watchtower"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=WatchVault@2024!
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'cluster_name'"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy

  watchvault:
    build: ./WatchVault
    ports:
      - "50052:50052"
      - "9500:9500"
    environment:
      - WATCHVAULT_OPENSEARCH_URL=http://opensearch:9200
      - WATCHVAULT_LOG_LEVEL=info
      - WATCHVAULT_API_KEY=sentinel-dev-api-key
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  watchtower:
    build: ./WatchTower
    ports:
      - "50051:50051"
      - "9400:9400"
    environment:
      - WATCHTOWER_LOG_LEVEL=info
      - WATCHTOWER_WATCHVAULT_ADDRESS=watchvault:50052
      - WATCHTOWER_ENGINE_WORKERS=4
      - WATCHTOWER_API_KEY=sentinel-dev-api-key
      - WATCHTOWER_DATABASE_URL=postgres://watchtower:watchtower_dev_pass@postgres:5432/watchtower?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      watchvault:
        condition: service_started
    restart: unless-stopped

  watchnode:
    build:
      context: ./WatchNode
      target: agent
    image: go-watchnode
    pid: host
    network_mode: host
    depends_on:
      - watchtower
    restart: unless-stopped

  watchnode-2:
    image: go-watchnode
    hostname: node-web-01
    command: ["--config", "/etc/watchnode/agent/config.yaml"]
    volumes:
      - ./WatchNode/configs/node-bridge.yaml:/etc/watchnode/agent/config.yaml:ro
    depends_on:
      - watchtower
    restart: unless-stopped

  watchnode-3:
    image: go-watchnode
    hostname: node-db-01
    command: ["--config", "/etc/watchnode/agent/config.yaml"]
    volumes:
      - ./WatchNode/configs/node-bridge.yaml:/etc/watchnode/agent/config.yaml:ro
    depends_on:
      - watchtower
    restart: unless-stopped

  watchnode-4:
    image: go-watchnode
    hostname: node-app-01
    command: ["--config", "/etc/watchnode/agent/config.yaml"]
    volumes:
      - ./WatchNode/configs/node-bridge.yaml:/etc/watchnode/agent/config.yaml:ro
    depends_on:
      - watchtower
    restart: unless-stopped

  watchnode-5:
    image: go-watchnode
    hostname: node-infra-01
    command: ["--config", "/etc/watchnode/agent/config.yaml"]
    volumes:
      - ./WatchNode/configs/node-bridge.yaml:/etc/watchnode/agent/config.yaml:ro
    depends_on:
      - watchtower
    restart: unless-stopped

  dashboard:
    build: ./sentinelCoreDashboard
    ports:
      - "5050:5050"
    environment:
      - WATCHTOWER_URL=http://watchtower:9400
      - OPENSEARCH_URL=http://opensearch:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=admin
      - VERIFY_SSL=false
      - SECRET_KEY=sentinel-dev-key
      - DASHBOARD_SUPER_ADMIN_USER=superadmin
      - DASHBOARD_SUPER_ADMIN_PASSWORD=superadmin
      - DASHBOARD_ADMIN_USER=admin
      - DASHBOARD_ADMIN_PASSWORD=admin
      - WATCHTOWER_API_KEY=sentinel-dev-api-key
    depends_on:
      - watchtower
      - opensearch
    restart: unless-stopped

volumes:
  postgres-data:
  opensearch-data:

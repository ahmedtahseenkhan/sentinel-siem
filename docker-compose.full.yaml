version: "3.8"

# Shared WatchTower instance config
x-watchtower-common: &watchtower-common
  build: ./WatchTower
  environment:
    - WATCHTOWER_LOG_LEVEL=info
    - WATCHTOWER_WATCHVAULT_ADDRESS=watchvault:50052
    - WATCHTOWER_ENGINE_WORKERS=16
    - WATCHTOWER_API_KEY=sentinel-dev-api-key
    - WATCHTOWER_DATABASE_URL=postgres://watchtower:watchtower_dev_pass@postgres:5432/watchtower?sslmode=disable
    - WATCHTOWER_GRPC_ENROLL_TOKEN=sentinel-enroll-secret-2024
    - WATCHTOWER_KAFKA_BROKERS=kafka:9092
    - WATCHTOWER_GRPC_TLS_CERT=/etc/sentinel/certs/watchtower.crt
    - WATCHTOWER_GRPC_TLS_KEY=/etc/sentinel/certs/watchtower.key
    - WATCHTOWER_GRPC_TLS_CA=/etc/sentinel/certs/ca.crt
    - WATCHTOWER_SYSLOG_ADDR=:5140
  volumes:
    - ./certs:/etc/sentinel/certs:ro
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy
  restart: unless-stopped

# Shared OpenSearch cluster environment
x-opensearch-common: &opensearch-common
  image: opensearchproject/opensearch:2.12.0
  environment:
    - cluster.name=sentinel-cluster
    - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
    - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2,opensearch-node3
    - bootstrap.memory_lock=true
    - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    - DISABLE_INSTALL_DEMO_CONFIG=true
    - DISABLE_SECURITY_PLUGIN=true
    - network.host=0.0.0.0
  ulimits:
    memlock:
      soft: -1
      hard: -1
    nofile:
      soft: 65536
      hard: 65536
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=watchtower
      - POSTGRES_USER=watchtower
      - POSTGRES_PASSWORD=watchtower_dev_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchtower -d watchtower"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=6
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_LOG_RETENTION_HOURS=72
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  opensearch-node1:
    <<: *opensearch-common
    environment:
      - cluster.name=sentinel-cluster
      - node.name=opensearch-node1
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - network.host=0.0.0.0
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s

  opensearch-node2:
    <<: *opensearch-common
    environment:
      - cluster.name=sentinel-cluster
      - node.name=opensearch-node2
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - network.host=0.0.0.0
    volumes:
      - opensearch-data2:/usr/share/opensearch/data

  opensearch-node3:
    <<: *opensearch-common
    environment:
      - cluster.name=sentinel-cluster
      - node.name=opensearch-node3
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - network.host=0.0.0.0
    volumes:
      - opensearch-data3:/usr/share/opensearch/data

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch-node1:9200","http://opensearch-node2:9200","http://opensearch-node3:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch-node1:
        condition: service_healthy
    restart: unless-stopped

  watchvault:
    build: ./WatchVault
    ports:
      - "50052:50052"
      - "9500:9500"
    environment:
      - WATCHVAULT_OPENSEARCH_URLS=http://opensearch-node1:9200,http://opensearch-node2:9200,http://opensearch-node3:9200
      - WATCHVAULT_LOG_LEVEL=info
      - WATCHVAULT_API_KEY=sentinel-dev-api-key
      - WATCHVAULT_KAFKA_BROKERS=kafka:9092
    depends_on:
      opensearch-node1:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  haproxy:
    image: haproxy:2.9-alpine
    ports:
      - "50051:50051"   # gRPC (agents) — sticky source hash
      - "9400:9400"     # REST API — round-robin
      - "5140:5140"     # Syslog UDP+TCP (firewalls, routers)
      - "8404:8404"     # HAProxy stats dashboard
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - watchtower
      - watchtower-2
    restart: unless-stopped

  watchtower:
    <<: *watchtower-common

  watchtower-2:
    <<: *watchtower-common

  watchnode:
    build:
      context: ./WatchNode
      target: agent
    image: go-watchnode
    pid: host
    network_mode: host
    depends_on:
      - haproxy
    restart: unless-stopped

  watchnode-2:
    image: go-watchnode
    hostname: node-web-01
    command: ["--config", "/etc/watchnode/agent/config.yaml"]
    volumes:
      - ./WatchNode/configs/node-bridge.yaml:/etc/watchnode/agent/config.yaml:ro
      - ./certs:/etc/sentinel/certs:ro
    depends_on:
      - haproxy
    restart: unless-stopped

  watchnode-3:
    image: go-watchnode
    hostname: node-db-01
    command: ["--config", "/etc/watchnode/agent/config.yaml"]
    volumes:
      - ./WatchNode/configs/node-bridge.yaml:/etc/watchnode/agent/config.yaml:ro
      - ./certs:/etc/sentinel/certs:ro
    depends_on:
      - haproxy
    restart: unless-stopped

  watchnode-4:
    image: go-watchnode
    hostname: node-app-01
    command: ["--config", "/etc/watchnode/agent/config.yaml"]
    volumes:
      - ./WatchNode/configs/node-bridge.yaml:/etc/watchnode/agent/config.yaml:ro
      - ./certs:/etc/sentinel/certs:ro
    depends_on:
      - haproxy
    restart: unless-stopped

  watchnode-5:
    image: go-watchnode
    hostname: node-infra-01
    command: ["--config", "/etc/watchnode/agent/config.yaml"]
    volumes:
      - ./WatchNode/configs/node-bridge.yaml:/etc/watchnode/agent/config.yaml:ro
      - ./certs:/etc/sentinel/certs:ro
    depends_on:
      - haproxy
    restart: unless-stopped

  dashboard:
    build: ./sentinelCoreDashboard
    ports:
      - "5050:5050"
    environment:
      - WATCHTOWER_URL=http://haproxy:9400
      - OPENSEARCH_URL=http://opensearch-node1:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=admin
      - VERIFY_SSL=false
      - SECRET_KEY=sentinel-dev-key
      - DASHBOARD_SUPER_ADMIN_USER=superadmin
      - DASHBOARD_SUPER_ADMIN_PASSWORD=superadmin
      - DASHBOARD_ADMIN_USER=admin
      - DASHBOARD_ADMIN_PASSWORD=admin
      - WATCHTOWER_API_KEY=sentinel-dev-api-key
    depends_on:
      - watchtower
      - opensearch-node1
    restart: unless-stopped

volumes:
  postgres-data:
  opensearch-data1:
  opensearch-data2:
  opensearch-data3:
  kafka-data:
